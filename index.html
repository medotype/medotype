<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MeDoType</title>

    <script>
        if (/Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent)) {
            window.location.replace('mobile/index.html');
        }
    </script>

    <script>

        // theres prob a better way to do this fuck me
    function syncNav() {
        const frame = document.getElementById('main-frame');
        const currentUrl = frame.contentWindow.location.pathname;
        const navLinks = document.querySelectorAll('.nav-links a');

        const categoryMap = {
            'home': ['home.html', 'welcome.html', 'singleplayer', 'ranked'],
            'shop': ['shop'],
            'leaderboard': ['leaderboard.html'],
            'settings': ['settings.html'],
            'admin': ['admin'],
            'account': ['login.html', 'account.html']
        };

        navLinks.forEach(link => {
            link.classList.remove('active');
            
            const category = link.getAttribute('data-category'); // boi this is terrible code :sob:
            if (category && categoryMap[category].some(keyword => currentUrl.includes(keyword))) {
                link.classList.add('active');
            }
        });
    }
</script>

    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="data/css/index.css">
    <link rel="stylesheet" href="data/css/root.css">
    <script src="/data/js/theme.js"></script>
    <link rel="icon" type="image/x-icon" href="favicon.ico?v=1">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        #incoming-toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: var(--card-bg);
            border: 1px solid var(--accent);
            border-radius: 12px;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.6);
            padding: 18px 22px;
            transform: translateX(180%);
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            z-index: 9999; 
            display: flex;
            flex-direction: column;
            gap: 14px;
            min-width: 260px;
            text-align: left;
            font-family: var(--font, 'Inter', sans-serif);
        }

        #incoming-toast.show { transform: translateX(0); }

        .incoming-header {
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text-bright);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .incoming-buttons {
            display: flex;
            gap: 8px;
        }

        .toast-btn {
            flex: 1;
            padding: 8px;
            border: none;
            border-radius: 6px;
            font-family: var(--font, 'Inter', sans-serif);
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .toast-btn-accept { background: var(--accent); color: white; }
        .toast-btn-decline { background: rgba(255, 255, 255, 0.1); color: var(--text-faded); }
        .toast-btn:hover { opacity: 0.9; }

        #jumpscare-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: #000;
            z-index: 100000;
            display: none;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.15s ease;
        }
        #jumpscare-overlay.active {
            display: flex;
            opacity: 1;
        }
        #jumpscare-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
    </style>
</head>
    
<body>

    <header>
        <div class="brand" onclick="navigateFrame('pages/home.html', this)">

        </div>

        <div class="search-container">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input type="text" id="global-search" placeholder="search users..." onkeypress="if(event.key === 'Enter') handleSearch()">
        </div>
        
<nav class="nav-links">

        <i class="fa-solid fa-house"></i>
    </a>
    <a onclick="navigateFrame('pages/shop', this)" data-category="shop" title="Shop">

    </a>
    <a onclick="navigateFrame('pages/leaderboard.html', this)" data-category="leaderboard" title="Leaderboard">

    <main class="content-wrapper">
<iframe id="main-frame" src="pages/home.html" onload="syncNav()" title="Loading..."></iframe>

    <footer>
        <div class="footer-left">
            <span>&copy; 2026 <span class="footer-accent">MeDoType</span></span>

    <div id="incoming-toast">
        <div class="incoming-header">
            <i class="fa-solid fa-bolt" style="color: var(--accent);"></i>
            <span id="challenge-prompt">Player challenged you!</span>
        </div>
        <div class="incoming-buttons">
            <button class="toast-btn toast-btn-accept" onclick="respondToGlobalChallenge(true)">Accept</button>
            <button class="toast-btn toast-btn-decline" onclick="respondToGlobalChallenge(false)">Decline</button>
        </div>

    <div id="jumpscare-overlay">
        <img id="jumpscare-image" src="" alt="Jumpscare">
    </div>

    <script src="data/js/index.js"></script>

    <script>
        const JUMPSCARE_CONFIG = {
            "shittyclown": {
                "image": "../data/images/jumpscares/shittyclown.png",
                "audio": "/data/sounds/jumpscare/scream.mp3"
            },
            "doggun": {
                "image": "../data/images/jumpscares/doggun.png",
                "audio": "/data/sounds/jumpscare/scream.mp3"
            },
            "cityboii": {
                "image": "../data/images/jumpscares/cityboii.png",
                "audio": "/data/sounds/jumpscare/cityboii.mp3"
            },
            "fart": {
                "image": "../data/images/jumpscares/fart.png",
                "audio": "/data/sounds/jumpscare/fart.mp3"
            }
        };

        const SHELL_SB_URL = 'https://tzaowqeofmwfnprrfwat.supabase.co';
        const SHELL_SB_KEY = 'sb_publishable_Sr33ux9FL6QZaJlfhjoqFw_tIwQhSbx';
        const shellSupabase = supabase.createClient(SHELL_SB_URL, SHELL_SB_KEY);

        let shellCurrentUsername = null;
        let shellActiveRequest = null;

        async function initGlobalChallengeListener() {
            const { data: { session } } = await shellSupabase.auth.getSession();
            if (!session) return;

            const { data: profile } = await shellSupabase
                .from('profiles')
                .select('username, is_admin')
                .eq('id', session.user.id)
                .single();

            if (profile) {
                if (profile.is_admin === true) {
                    const adminNavButton = document.getElementById('nav-admin');
                    if (adminNavButton) {
                        adminNavButton.style.display = ''; 
                    }
                }

                if (profile.username) {
                    shellCurrentUsername = profile.username;
                    
                    shellSupabase.channel('global_incoming_challenges')
                        .on('postgres_changes', {
                            event: 'INSERT',
                            schema: 'public',
                            table: '1v1_queue',
                            filter: `target_username=eq.${shellCurrentUsername}`
                        }, payload => {
                            if (payload.new.status === 'pending') {
                                showGlobalChallengeToast(payload.new);
                            }
                        })
                        .subscribe();
                }
            }
        }

        function initGlobalJumpscareListener() {
            shellSupabase.channel('app-jumpscare-stream')
                .on('broadcast', { event: 'execute-scare' }, payload => {
                    const target = payload.payload.targetUsername;
                    const visual = payload.payload.visualSource;
                    
                    if (target === 'all' || (shellCurrentUsername && target.toLowerCase() === shellCurrentUsername.toLowerCase())) {
                        executeClientSideJumpscare(visual);
                    }
                })
                .subscribe();
        }

        function executeClientSideJumpscare(visualSource) {
            const overlay = document.getElementById('jumpscare-overlay');
            const imgElement = document.getElementById('jumpscare-image');
            if (!overlay || !imgElement) return;

            let determinedImage = visualSource;
            let audioProfile = "default_beep";

            if (JUMPSCARE_CONFIG[visualSource]) {
                determinedImage = JUMPSCARE_CONFIG[visualSource].image;
                audioProfile = JUMPSCARE_CONFIG[visualSource].audio;
            } else {
                for (const key in JUMPSCARE_CONFIG) {
                    if (JUMPSCARE_CONFIG[key].image === visualSource) {
                        audioProfile = JUMPSCARE_CONFIG[key].audio;
                        break;
                    }
                }
            }

            imgElement.src = determinedImage;

            if (audioProfile === "default_beep") {
                playUniformBeepAudio();
            } else {
                const customAudio = new Audio(audioProfile);
                customAudio.play().catch(e => console.warn(e));
            }

            overlay.classList.add('active');

            setTimeout(() => {
                overlay.style.opacity = '0';
                setTimeout(() => {
                    overlay.classList.remove('active');
                    overlay.style.opacity = ''; 
                }, 150);
            }, 1400);
        }

        function playUniformBeepAudio() {
            try {
                const AudioContextClass = window.AudioContext || window.webkitAudioContext;
                if (!AudioContextClass) return;
                
                const audioCtx = new AudioContextClass();
                const oscillator = audioCtx.createOscillator();
                const audioGainNode = audioCtx.createGain();
                
                oscillator.type = 'sine';
                oscillator.frequency.setValueAtTime(880, audioCtx.currentTime); 
                
                audioGainNode.gain.setValueAtTime(0.6, audioCtx.currentTime);
                audioGainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.4);
                
                oscillator.connect(audioGainNode);
                audioGainNode.connect(audioCtx.destination);
                
                oscillator.start();
                oscillator.stop(audioCtx.currentTime + 0.4);
            } catch (error) {
                console.warn(error);
            }
        }

        function showGlobalChallengeToast(request) {
            shellActiveRequest = request;
            document.getElementById('challenge-prompt').innerHTML = `<b>${request.username}</b> challenged you!`;
            document.getElementById('incoming-toast').classList.add('show');
        }

        async function respondToGlobalChallenge(accept) {
            if (!shellActiveRequest) return;
            document.getElementById('incoming-toast').classList.remove('show');

            const req = shellActiveRequest;
            shellActiveRequest = null;

            if (accept) {
                const uniqueRoomId = (typeof crypto !== 'undefined' && crypto.randomUUID) 
                    ? crypto.randomUUID() 
                    : Math.random().toString(36).substring(2, 15) + Math.random().toString(36).substring(2, 15);
                
                const { error } = await shellSupabase
                    .from('1v1_queue')
                    .update({ status: 'accepted', match_id: uniqueRoomId })
                    .eq('id', req.id);

                if (!error) {
                    const frame = document.getElementById('main-frame');
                    if (frame) {
                        frame.src = `pages/ranked/1v1.html?${uniqueRoomId}`;
                    }
                } else {
                    console.error("Failed to accept challenge", error);
                }
            } else {
                await shellSupabase.from('1v1_queue').update({ status: 'declined' }).eq('id', req.id);
            }
        }

        window.addEventListener('DOMContentLoaded', () => {
            initGlobalChallengeListener();
            initGlobalJumpscareListener();
        });
    </script>
</body>
</html>
