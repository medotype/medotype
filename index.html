<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MeDoType</title>

    <script>
        if (/Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent)) {
            window.location.replace('mobile/index.html');
        }
    </script>

    <script>
    function syncNav() {
        const frame = document.getElementById('main-frame');
        const currentUrl = frame.contentWindow.location.pathname;
        const navLinks = document.querySelectorAll('.nav-links a');

        const categoryMap = {
            'home': ['home.html', 'welcome.html', 'singleplayer', 'ranked'],
            'shop': ['shop'],
            'leaderboard': ['leaderboard.html'],
            'settings': ['settings.html'],
            'admin': ['admin'],
            'account': ['login.html', 'account', 'index.html'] // Included index for account
        };

        navLinks.forEach(link => {
            link.classList.remove('active');
            
            const category = link.getAttribute('data-category');
            if (category && categoryMap[category].some(keyword => currentUrl.includes(keyword))) {
                link.classList.add('active');
            }
        });
    }
</script>

    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="data/css/index.css">
    <link rel="stylesheet" href="data/css/root.css">
    <script src="/data/js/theme.js"></script>
    <link rel="icon" type="image/x-icon" href="favicon.ico?v=1">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../data/js/warning.js"></script>

    <style>
        /* Interactive Toast Style Notification styling */
        .toast-notification {
            position: fixed;
            right: 24px;
            background: var(--card-bg);
            border: 1px solid var(--accent);
            border-radius: 12px;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.6);
            padding: 18px 22px;
            transform: translateX(180%);
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            z-index: 9999; 
            display: flex;
            flex-direction: column;
            gap: 14px;
            min-width: 260px;
            text-align: left;
            font-family: var(--font, 'Inter', sans-serif);
        }

        #incoming-toast { bottom: 24px; }
        #friend-toast { bottom: 124px; border-color: #10b981; } /* Slightly higher up, distinct border */

        .toast-notification.show { transform: translateX(0); }

        .incoming-header {
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text-bright);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .incoming-buttons { display: flex; gap: 8px; }

        .toast-btn {
            flex: 1;
            padding: 8px;
            border: none;
            border-radius: 6px;
            font-family: var(--font, 'Inter', sans-serif);
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .toast-btn-accept { background: var(--accent); color: white; }
        .toast-btn-friend { background: #10b981; color: white; }
        .toast-btn-decline { background: rgba(255, 255, 255, 0.1); color: var(--text-faded); }
        .toast-btn:hover { opacity: 0.9; }

        #jumpscare-overlay {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: #000;
            z-index: 100000;
            display: none;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.15s ease;
        }
        #jumpscare-overlay.active {
            display: flex;
            opacity: 1;
        }
        #jumpscare-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        #global-message-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100vw;
            z-index: 100005; 
            display: none;
            justify-content: center;
            font-family: var(--font, 'Inter', sans-serif);
            padding: 0;
            box-sizing: border-box;
            pointer-events: none;
        }
        #global-message-overlay.active { display: flex; }

        .global-message-card {
            background: rgba(18, 18, 20, 0.5); 
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            border-left: 1px solid rgba(255, 255, 255, 0.05);
            border-right: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 0 0 16px 16px;
            padding: 16px 28px 8px 28px;
            width: 100%;
            max-width: 650px;
            box-shadow: 0 16px 40px rgba(0,0,0,0.5);
            text-align: center;
            pointer-events: auto;
            animation: robloxSlideDown 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes robloxSlideDown {
            from { transform: translateY(-100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .global-message-header {
            font-size: 0.8rem;
            font-weight: 800;
            color: var(--accent, #a855f7);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 4px;
        }
        
        .global-message-body {
            font-size: 1.05rem;
            line-height: 1.5;
            color: #ffffff; 
            margin-bottom: 10px;
            word-wrap: break-word;
            font-weight: 500;
        }

        .global-message-close-container {
            display: flex;
            justify-content: center;
            width: 100%;
        }

        .global-message-close-btn {
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.35);
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            cursor: pointer;
            padding: 2px 10px;
            transition: color 0.2s, opacity 0.2s;
        }
        .global-message-close-btn:hover { color: #ffffff; }
    </style>
</head>
    
<body>

    <header>
        <div class="brand" onclick="navigateFrame('pages/home.html', this)">
            <i class="fa-solid fa-keyboard"></i>
            <span class="logo-text">MeDoType</span>
        </div>

        <div class="search-container">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input type="text" id="global-search" placeholder="search users..." onkeypress="if(event.key === 'Enter') handleSearch()">
        </div>
        
        <nav class="nav-links">
            <a onclick="navigateFrame('pages/home.html', this)" data-category="home" class="active" title="Home">
                <i class="fa-solid fa-house"></i>
            </a>
            <a onclick="navigateFrame('pages/shop', this)" data-category="shop" title="Shop">
                <i class="fa-solid fa-bag-shopping"></i>
            </a>
            <a onclick="navigateFrame('pages/leaderboard.html', this)" data-category="leaderboard" title="Leaderboard">
                <i class="fa-solid fa-trophy"></i>
            </a>
            <a onclick="navigateFrame('pages/settings.html', this)" data-category="settings" title="Settings">

            </a>
            <a id="nav-admin" onclick="navigateFrame('pages/admin/index.html', this)" data-category="admin" title="Admin" style="display: none;">
                <i class="fa-solid fa-user-gear"></i>
            </a>
            <a onclick="navigateFrame('pages/account/index.html', this)" data-category="account" title="Account">
                <i class="fa-solid fa-circle-user"></i>
            </a>
        </nav>
    </header>

    <main class="content-wrapper">
        <iframe id="main-frame" src="pages/home.html" onload="syncNav()" title="Loading..."></iframe>
    </main>

    <footer>
        <div class="footer-left">
            <span>&copy; 2026 <span class="footer-accent">MeDoType</span></span>
        </div>
        <div class="footer-right">BETA</div>
    </footer>

    <div id="incoming-toast" class="toast-notification">
        <div class="incoming-header">
            <i class="fa-solid fa-bolt" style="color: var(--accent);"></i>
            <span id="challenge-prompt">Player challenged you!</span>
        </div>
        <div class="incoming-buttons">
            <button class="toast-btn toast-btn-accept" onclick="respondToGlobalChallenge(true)">Accept</button>
            <button class="toast-btn toast-btn-decline" onclick="respondToGlobalChallenge(false)">Decline</button>
        </div>
    </div>

    <div id="friend-toast" class="toast-notification">
        <div class="incoming-header">
            <i class="fa-solid fa-user-plus" style="color: #10b981;"></i>
            <span id="friend-prompt">New friend request!</span>
        </div>
        <div class="incoming-buttons">
            <button class="toast-btn toast-btn-friend" onclick="respondToFriendRequest(true)">Accept</button>
            <button class="toast-btn toast-btn-decline" onclick="respondToFriendRequest(false)">Decline</button>
        </div>
    </div>

    <div id="global-message-overlay">
        <div class="global-message-card">
            <div id="global-msg-user-header" class="global-message-header">sent by Admin</div>
            <div id="global-msg-body-content" class="global-message-body">Message Content Goes Here.</div>
            <div class="global-message-close-container">
                <button class="global-message-close-btn" onclick="closeGlobalMessageOverlay()">[ close ]</button>
            </div>
        </div>
    </div>

    <div id="jumpscare-overlay">
        <img id="jumpscare-image" src="" alt="Jumpscare">
    </div>

    <script src="data/js/index.js"></script>

    <script>
        const JUMPSCARE_CONFIG = {
            "shittyclown": { "image": "../data/images/jumpscares/shittyclown.png", "audio": "/data/sounds/jumpscare/scream.mp3" },
            "doggun": { "image": "../data/images/jumpscares/doggun.png", "audio": "/data/sounds/jumpscare/scream.mp3" },
            "cityboii": { "image": "../data/images/jumpscares/cityboii.png", "audio": "/data/sounds/jumpscare/cityboii.mp3" },
            "fart": { "image": "../data/images/jumpscares/fart.png", "audio": "/data/sounds/jumpscare/fart.mp3" }
        };

        const SHELL_SB_URL = 'https://tzaowqeofmwfnprrfwat.supabase.co';
        const SHELL_SB_KEY = 'sb_publishable_Sr33ux9FL6QZaJlfhjoqFw_tIwQhSbx';
        const shellSupabase = supabase.createClient(SHELL_SB_URL, SHELL_SB_KEY);

        let shellCurrentUsername = null;
        let shellCurrentUserId = null;
        let shellActiveRequest = null;
        let shellActiveFriendReqId = null;
        let autoDismissTimer = null; 

        async function initGlobalListeners() {
            const { data: { session } } = await shellSupabase.auth.getSession();
            if (!session) return;
            
            shellCurrentUserId = session.user.id;

            const { data: profile } = await shellSupabase
                .from('profiles')
                .select('username, is_admin')
                .eq('id', shellCurrentUserId)
                .single();

            if (profile) {
                if (profile.is_admin === true) {
                    const adminNavButton = document.getElementById('nav-admin');
                    if (adminNavButton) adminNavButton.style.display = ''; 
                }

                if (profile.username) {
                    shellCurrentUsername = profile.username;
                    
                    // 1V1 Challenges
                    shellSupabase.channel('global_incoming_challenges')
                        .on('postgres_changes', {
                            event: 'INSERT',
                            schema: 'public',
                            table: '1v1_queue',
                            filter: `target_username=eq.${shellCurrentUsername}`
                        }, payload => {
                            if (payload.new.status === 'pending') showGlobalChallengeToast(payload.new);
                        })
                        .subscribe();
                }
            }

            // Friend Requests Listener
            shellSupabase.channel('global_incoming_friends')
                .on('postgres_changes', {
                    event: 'INSERT',
                    schema: 'public',
                    table: 'friends',
                    filter: `receiver_id=eq.${shellCurrentUserId}`
                }, async payload => {
                    if (payload.new.status === 'pending') {
                        // Fetch requester's username
                        const { data } = await shellSupabase.from('profiles')
                            .select('username').eq('id', payload.new.requester_id).single();
                        if (data) showFriendToast(payload.new.id, data.username);
                    }
                })
                .subscribe();
        }

        // --- Friend Request Logic ---
        function showFriendToast(reqId, username) {
            shellActiveFriendReqId = reqId;
            document.getElementById('friend-prompt').innerHTML = `<b>${username}</b> sent a friend request!`;
            document.getElementById('friend-toast').classList.add('show');
        }

        async function respondToFriendRequest(accept) {
            if (!shellActiveFriendReqId) return;
            document.getElementById('friend-toast').classList.remove('show');
            const reqId = shellActiveFriendReqId;
            shellActiveFriendReqId = null;

            if (accept) {
                await shellSupabase.from('friends').update({ status: 'accepted' }).eq('id', reqId);
                // Optionally reload frame if they are on account page
            } else {
                await shellSupabase.from('friends').delete().eq('id', reqId);
            }
        }

        function initGlobalCommunicationListener() {
            shellSupabase.channel('app-jumpscare-stream')
                .on('broadcast', { event: 'execute-scare' }, payload => {
                    const target = payload.payload.targetUsername;
                    const visual = payload.payload.visualSource;
                    
                    if (target === 'all' || (shellCurrentUsername && target.toLowerCase() === shellCurrentUsername.toLowerCase())) {
                        executeClientSideJumpscare(visual);
                    }
                })
                .on('broadcast', { event: 'global-message' }, payload => {
                    displayGlobalClientMessage(payload.payload.sender, payload.payload.message);
                })
                .on('broadcast', { event: 'chest-settings-update' }, payload => {
                    window.globalDailyChestRewardBase = payload.payload.baseCoins;
                    window.globalDailyChestCooldownHours = payload.payload.cooldownHrs;
                })
                .subscribe();
        }

        function displayGlobalClientMessage(sender, message) {
            const msgOverlay = document.getElementById('global-message-overlay');
            const msgHeader = document.getElementById('global-msg-user-header');
            const msgBody = document.getElementById('global-msg-body-content');

            if (msgOverlay && msgHeader && msgBody) {
                msgHeader.innerText = `sent by ${sender}`;
                msgBody.innerText = message;
                msgOverlay.classList.add('active');

                if (autoDismissTimer) clearTimeout(autoDismissTimer);
                autoDismissTimer = setTimeout(() => closeGlobalMessageOverlay(), 5000);
            }
        }

        function closeGlobalMessageOverlay() {
            const msgOverlay = document.getElementById('global-message-overlay');
            if (msgOverlay) msgOverlay.classList.remove('active');
            if (autoDismissTimer) {
                clearTimeout(autoDismissTimer);
                autoDismissTimer = null;
            }
        }

        function executeClientSideJumpscare(visualSource) {
            const overlay = document.getElementById('jumpscare-overlay');
            const imgElement = document.getElementById('jumpscare-image');
            if (!overlay || !imgElement) return;

            let determinedImage = visualSource;
            let audioProfile = "default_beep";

            if (JUMPSCARE_CONFIG[visualSource]) {
                determinedImage = JUMPSCARE_CONFIG[visualSource].image;
                audioProfile = JUMPSCARE_CONFIG[visualSource].audio;
            } else {
                for (const key in JUMPSCARE_CONFIG) {
                    if (JUMPSCARE_CONFIG[key].image === visualSource) {
                        audioProfile = JUMPSCARE_CONFIG[key].audio;
                        break;
                    }
                }
            }

            imgElement.src = determinedImage;
            if (audioProfile === "default_beep") playUniformBeepAudio();
            else {
                const customAudio = new Audio(audioProfile);
                customAudio.play().catch(e => console.warn(e));
            }

            overlay.classList.add('active');

            setTimeout(() => {
                overlay.style.opacity = '0';
                setTimeout(() => {
                    overlay.classList.remove('active');
                    overlay.style.opacity = ''; 
                }, 150);
            }, 1400);
        }

        function playUniformBeepAudio() {
            try {
                const AudioContextClass = window.AudioContext || window.webkitAudioContext;
                if (!AudioContextClass) return;
                const audioCtx = new AudioContextClass();
                const oscillator = audioCtx.createOscillator();
                const audioGainNode = audioCtx.createGain();
                
                oscillator.type = 'sine';
                oscillator.frequency.setValueAtTime(880, audioCtx.currentTime); 
                audioGainNode.gain.setValueAtTime(0.6, audioCtx.currentTime);
                audioGainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.4);
                
                oscillator.connect(audioGainNode);
                audioGainNode.connect(audioCtx.destination);
                
                oscillator.start();
                oscillator.stop(audioCtx.currentTime + 0.4);
            } catch (error) { console.warn(error); }
        }

        function showGlobalChallengeToast(request) {
            shellActiveRequest = request;
            document.getElementById('challenge-prompt').innerHTML = `<b>${request.username}</b> challenged you!`;
            document.getElementById('incoming-toast').classList.add('show');
        }

        async function respondToGlobalChallenge(accept) {
            if (!shellActiveRequest) return;
            document.getElementById('incoming-toast').classList.remove('show');
            const req = shellActiveRequest;
            shellActiveRequest = null;

            if (accept) {
                const uniqueRoomId = (typeof crypto !== 'undefined' && crypto.randomUUID) 
                    ? crypto.randomUUID() 
                    : Math.random().toString(36).substring(2, 15) + Math.random().toString(36).substring(2, 15);
                
                const { error } = await shellSupabase
                    .from('1v1_queue')
                    .update({ status: 'accepted', match_id: uniqueRoomId })
                    .eq('id', req.id);

                if (!error) {
                    const frame = document.getElementById('main-frame');
                    if (frame) frame.src = `pages/ranked/1v1.html?${uniqueRoomId}`;
                }
            } else {
                await shellSupabase.from('1v1_queue').update({ status: 'declined' }).eq('id', req.id);
            }
        }

        window.addEventListener('DOMContentLoaded', () => {
            initGlobalListeners();
            initGlobalCommunicationListener();
        });
    </script>
</body>
</html>
