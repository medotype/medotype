<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MeDoType | Account</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght=300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../data/css/root.css">
    <script src="../../data/js/theme.js"></script>
    <style>

        body {
            background-color: transparent;
            color: var(--text-bright);
            font-family: var(--font);
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        input:-webkit-autofill,
        input:-webkit-autofill:hover, 
        input:-webkit-autofill:focus {
            -webkit-text-fill-color: var(--text-bright);
            -webkit-box-shadow: 0 0 0px 1000px var(--bg) inset;
            transition: background-color 5000s ease-in-out 0s;
            font-family: var(--font);
        }

        .auth-container {
            background: var(--card-bg);
            padding: 2rem 2.5rem;
            border-radius: 20px;
            width: 95%;
            max-width: 950px;
            display: flex;
            flex-direction: row;
            align-items: center;
            gap: 2.5rem;
            border: 1px solid rgba(255, 255, 255, 0.03);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .brand-side {
            flex: 0 0 240px;
            text-align: left;
            border-right: 1px solid rgba(255, 255, 255, 0.05);
            padding-right: 2rem;
            display: flex;
            flex-direction: column;
        }

        #title, #subtitle, #legal-notice {
            transition: opacity 0.3s ease, transform 0.3s ease;
        }

        .brand-side h2 { margin: 0; font-size: 1.8rem; letter-spacing: -0.03em; font-weight: 600; }
        .brand-side p { color: var(--text-faded); font-size: 0.9rem; margin: 0.5rem 0 1.5rem; line-height: 1.4; }

        .form-side {
            flex: 1;
            display: flex;
            flex-direction: row;
            gap: 12px;
            align-items: flex-end;
            min-height: 80px;
        }

        /* The Slide Effect */
        .input-wrap {
            flex: 1;
            min-width: 0; /* Allows shrinking below content size */
            text-align: left;
            opacity: 1;
            transform: translateY(0);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            visibility: visible;
        }

        .input-wrap.hidden {
            flex: 0;
            padding: 0;
            margin: 0;
            opacity: 0;
            transform: translateY(10px);
            pointer-events: none;
            visibility: hidden;
        }

        label { 
            display: block; 
            font-size: 0.65rem; 
            color: var(--text-faded); 
            margin-bottom: 0.5rem; 
            text-transform: uppercase; 
            letter-spacing: 0.1em; 
            font-weight: 600;
        }
        
        input {
            width: 100%;
            padding: 12px 16px;
            background: var(--bg);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 10px;
            color: white;
            font-family: var(--font);
            font-size: 0.9rem;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        input:focus { 
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        .btn {
            padding: 12px 28px;
            border-radius: 10px;
            border: none;
            font-family: var(--font);
            font-weight: 600;
            background: var(--accent);
            color: white;
            cursor: pointer;
            white-space: nowrap;
            transition: transform 0.2s, opacity 0.2s;
            margin-bottom: 1px; /* Align with inputs */
        }

        .btn:hover { opacity: 0.9; transform: translateY(-1px); }
        .btn:active { transform: translateY(0); }

        /* Discord Button Styling */
        .discord-btn {
            background: #5865F2;
            margin-top: 1.2rem;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .discord-btn:hover { background: #4752C4; opacity: 1; }

        /* Legal Notice styling */
        .legal-notice {
            font-size: 0.72rem;
            color: var(--text-faded);
            margin-top: 1.2rem;
            line-height: 1.4;
        }
        .legal-notice a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 500;
        }
        .legal-notice a:hover {
            text-decoration: underline;
        }

        .toggle-btn {
            background: transparent;
            color: var(--accent);
            border: none;
            cursor: pointer;
            padding: 0;
            font-size: 0.85rem;
            font-weight: 500;
            transition: opacity 0.2s;
            text-align: left;
        }
        
        .toggle-btn:hover { text-decoration: underline; opacity: 0.8; }

        #msg-container {
            position: absolute;
            bottom: -30px;
            left: 2.5rem;
        }

        #msg { 
            font-size: 0.8rem; 
            margin: 0;
        }

        .err { color: var(--error); }
        .success { color: #10b981; }

        @media (max-width: 800px) {
            .auth-container { flex-direction: column; text-align: center; gap: 1.5rem; padding: 2rem; }
            .brand-side { border-right: none; padding-right: 0; flex: none; width: 100%; align-items: center; }
            .toggle-btn { text-align: center; }
            .form-side { flex-direction: column; width: 100%; align-items: stretch; }
            .input-wrap.hidden { flex: none; height: 0; overflow: hidden; }
            .btn { width: 100%; }
        }
        
        /* Overlay Styles */
        #verify-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(18, 18, 19, 0.95);
            display: none; 
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            backdrop-filter: blur(8px);
            text-align: center;
            animation: fadeIn 0.3s ease;
        }

        .verify-card {
            background: var(--card-bg);
            padding: 3rem;
            border-radius: 24px;
            border: 1px solid rgba(255,255,255,0.05);
            max-width: 400px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .verify-card i {
            font-size: 3rem;
            color: var(--accent);
            margin-bottom: 1.5rem;
        }

        .verify-card h2 { margin: 0 0 1rem 0; }
        .verify-card p { color: var(--text-faded); line-height: 1.6; margin-bottom: 2rem; }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

    </style>
</head>
<body>
    
    <div class="auth-container">
        <div class="brand-side">
            <h2 id="title">MeDoType</h2>
            <p id="subtitle">Track your speed and progress.</p>
            <button class="toggle-btn" onclick="manualToggle()" id="mode-hint">
                Already a member? Login
            </button>
            
            <button class="btn discord-btn" onclick="handleDiscordLogin()">
                <svg width="18" height="18" viewBox="0 0 127.14 96.36" fill="currentColor"><path d="M107.7,8.07A105.15,105.15,0,0,0,77.26,0a77.19,77.19,0,0,0-3.3,6.83A96.67,96.67,0,0,0,53.22,6.83,77.19,77.19,0,0,0,49.88,0,105.15,105.15,0,0,0,19.44,8.07C3.66,31.58-1.86,54.65,1,77.53A105.73,105.73,0,0,0,32,96.36a74.37,74.37,0,0,0,6.73-11,68.43,68.43,0,0,1-10.64-5.12c.91-.66,1.8-1.34,2.65-2a75.58,75.58,0,0,0,72.86,0c.85.69,1.74,1.37,2.65,2a68.45,68.45,0,0,1-10.64,5.12,74.74,74.74,0,0,0,6.73,11,105.73,105.73,0,0,0,31-18.83C129,50.7,122.64,27.78,107.7,8.07ZM42.45,65.69C36.18,65.69,31,60,31,53S36.18,40.36,42.45,40.36,53.87,46,53.87,53,48.72,65.69,42.45,65.69Zm42.24,0C78.41,65.69,73.24,60,73.24,53S78.41,40.36,84.69,40.36,96.11,46,96.11,53,91,65.69,84.69,65.69Z"/></svg>
                Discord
            </button>

            <div class="legal-notice" id="legal-notice">
                By signing up, you agree to the <a href="legal.html">Terms of Service</a> and <a href="legal.html">Privacy Policy</a>.
            </div>
        </div>

        <div class="form-side" style="position: relative;">
            <div class="input-wrap">
                <label>Email</label>
                <input type="email" id="email" placeholder="you@example.com">
            </div>

            <div id="username-wrap" class="input-wrap">
                <label>Username</label>
                <input type="text" id="username" placeholder="Typist123" minlength="3" maxlength="12">
            </div>

            <div class="input-wrap">
                <label>Password</label>
                <input type="password" id="password" placeholder="••••••••">
            </div>

            <button class="btn" id="main-btn" onclick="handleAuth()">Go</button>
            
            <div id="msg-container">
                <p id="msg"></p>
            </div>
        </div>
        
        <div id="verify-overlay">
            <div class="verify-card">
                <i class="fa-solid fa-envelope-open-text"></i>
                <h2>Verify your email</h2>
                <p>We've sent a link to your inbox. Please click it to activate your account.</p>
                <button class="btn" id="check-status-btn" onclick="checkVerification()">I've Verified My Email</button>
                <p id="verify-msg" style="margin-top: 1rem; font-size: 0.8rem;"></p>
            </div>
        </div>
    </div>

<script>
        const SB_URL = 'https://tzaowqeofmwfnprrfwat.supabase.co';
        const SB_KEY = 'sb_publishable_Sr33ux9FL6QZaJlfhjoqFw_tIwQhSbx';
        const _supabase = supabase.createClient(SB_URL, SB_KEY);

        let isLogin = false; 
        let isCooldown = false;

        // Auto-detect login if the popup finishes while this iframe is still open
        _supabase.auth.onAuthStateChange((event, session) => {
            if (event === 'SIGNED_IN') {
                const msgEl = document.getElementById('msg');
                msgEl.innerText = 'Success!';
                msgEl.className = 'success';
                setTimeout(() => window.location.href = 'index.html', 1000);
            }
        });

        function setMode(loginMode) {
            isLogin = loginMode;
            const userWrap = document.getElementById('username-wrap');
            const title = document.getElementById('title');
            const subtitle = document.getElementById('subtitle');
            const btn = document.getElementById('main-btn');
            const hint = document.getElementById('mode-hint');
            const legalNotice = document.getElementById('legal-notice');

            title.style.opacity = 0;
            subtitle.style.opacity = 0;
            legalNotice.style.opacity = 0;

            setTimeout(() => {
                if (isLogin) {
                    userWrap.classList.add('hidden');
                    title.innerText = "Welcome Back";
                    subtitle.innerText = "Pick up where you left off.";
                    btn.innerText = "Login";
                    hint.innerText = "Need an account? Sign Up";
                    legalNotice.innerHTML = 'By logging in, you agree to the <a href="legal.html">Terms of Service</a> and <a href="legal.html">Privacy Policy</a>.';
                } else {
                    userWrap.classList.remove('hidden');
                    title.innerText = "MeDoType";
                    subtitle.innerText = "Track your speed and progress.";
                    btn.innerText = "Sign Up";
                    hint.innerText = "Already a member? Login";
                    legalNotice.innerHTML = 'By signing up, you agree to the <a href="legal.html">Terms of Service</a> and <a href="legal.html">Privacy Policy</a>.';
                }
                title.style.opacity = 1;
                subtitle.style.opacity = 1;
                legalNotice.style.opacity = 1;
            }, 200);
        }

        function manualToggle() { setMode(!isLogin); }
        setMode(false);

        let signupEmail = ""; 

        async function handleAuth() {
            if (isCooldown) return;
            
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value.trim();
            const username = document.getElementById('username').value.trim();
            const msgEl = document.getElementById('msg');

            if (!email || !password || (!isLogin && !username)) {
                msgEl.innerText = "Fill all fields.";
                msgEl.className = 'err';
                return;
            }

            if (!isLogin && (username.length < 3 || username.length > 12)) {
                msgEl.innerText = "Username must be 3-12 characters.";
                msgEl.className = 'err';
                return;
            }

            isCooldown = true;
            msgEl.innerText = "Loading...";
            msgEl.className = "";

            if (isLogin) {
                const { data, error } = await _supabase.auth.signInWithPassword({ email, password });
                
                if (error) {
                    msgEl.innerText = error.message;
                    msgEl.className = 'err';
                    isCooldown = false;
                }
            } else {
                signupEmail = email;
                const { data, error } = await _supabase.auth.signUp({ 
                    email, 
                    password, 
                    options: { data: { username } } 
                });

                if (error) {
                    msgEl.innerText = error.message;
                    msgEl.className = 'err';
                    isCooldown = false;
                } else {
                    document.getElementById('verify-overlay').style.display = 'flex';
                }
            }
        }

        async function handleDiscordLogin() {
            const msgEl = document.getElementById('msg');
            msgEl.innerText = "Opening Discord...";
            msgEl.className = "";

            const targetRedirect = window.location.href.substring(0, window.location.href.lastIndexOf('/')) + '/home.html';

            const { data, error } = await _supabase.auth.signInWithOAuth({
                provider: 'discord',
                options: {
                    redirectTo: targetRedirect,
                    skipBrowserRedirect: true 
                }
            });

            if (error) {
                msgEl.innerText = error.message;
                msgEl.className = 'err';
                return;
            }

            if (data?.url) {
                const popup = window.open(data.url, 'Discord Login', 'width=580,height=700,scrollbars=yes,resizable=yes');
                
                if (!popup || popup.closed || typeof popup.closed == 'undefined') {
                    msgEl.innerText = "Popup blocked! Please allow popups.";
                    msgEl.className = 'err';
                } else {
                    msgEl.innerText = "Complete login in the popout window.";
                }
            }
        }

        async function checkVerification() {
            const vMsg = document.getElementById('verify-msg');
            const btn = document.getElementById('check-status-btn');
            
            btn.innerText = "Checking...";
            vMsg.innerText = "";

            const { data, error } = await _supabase.auth.signInWithPassword({
                email: signupEmail,
                password: document.getElementById('password').value
            });

            if (error) {
                if (error.message.toLowerCase().includes("confirmed") || error.message.toLowerCase().includes("verify")) {
                    vMsg.innerText = "Still waiting for verification...";
                    vMsg.className = "err";
                } else {
                    vMsg.innerText = error.message;
                    vMsg.className = "err";
                }
                btn.innerText = "I've Verified My Email";
            }
        }
    </script>
</body>
</html>
