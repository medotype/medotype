<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MeDoType | Singleplayer</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght=300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../../data/css/root.css">
    <script src="../../data/js/theme.js"></script>
    <style>
        body { background-color: var(--bg); color: var(--text-bright); font-family: var(--font); margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        #app { width: 100%; max-width: 850px; text-align: center; padding: 2rem; position: relative; }
        
        #nav { margin-bottom: 3rem; display: inline-flex; background: var(--card-bg); padding: 6px; border-radius: 12px; gap: 5px; align-items: center; }
        
        .header-stats { 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            gap: 40px; 
            width: 100%; 
            margin-bottom: 2rem; 
            height: 2rem; 
        }
        
        .stat-box {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 1.3rem;
            font-weight: 500;
            color: var(--text-faded);
            min-width: 90px;
            justify-content: center;
            font-variant-numeric: tabular-nums;
        }
        
        .stat-box i { color: var(--accent); font-size: 1.1rem; }
        
        #combo-stat { transition: transform 0.1s; }
        #combo-stat.broken { color: var(--error); transform: translateX(-5px); }
        #combo-stat.broken i { color: var(--error); }

        #typing-viewport { height: 90px; overflow: hidden; position: relative; margin-bottom: 2rem; }
        #word-container { display: flex; flex-wrap: wrap; gap: 14px; justify-content: center; align-items: center; position: relative; top: 0; transition: top 0.25s cubic-bezier(0.4, 0, 0.2, 1); }
        
        .word { 
            font-size: 2rem; 
            font-weight: 400; 
            color: var(--text-faded); 
            letter-spacing: -0.02em; 
            position: relative; 
            display: inline-block; 
            white-space: nowrap;  
        }        
        .letter { position: relative; transition: color 0.1s ease; }
        .letter.correct { color: var(--text-bright); }
        .letter.incorrect { color: var(--error); border-bottom: 2px solid var(--error); }
        
        /* Alternate Mode Scripts Visual Modifications */
        .mode-blind .letter.correct { color: transparent !important; }
        .mode-blind .letter.incorrect { color: var(--error) !important; border-bottom: 2px solid transparent; }

        /* The Caret (Cursor) */
        .letter.active-char::before {
            content: ''; 
            position: absolute; 
            left: -2px; 
            top: 15%; 
            height: 70%; 
            width: 2px;
            background-color: var(--accent); 
            animation: blink 1s infinite;
            border-radius: 2px;
        }
        .word.active-end::after {
            content: ''; 
            position: absolute; 
            right: -6px; 
            top: 15%; 
            height: 70%; 
            width: 2px;
            background-color: var(--accent); 
            animation: blink 1s infinite;
            border-radius: 2px;
        }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
        
        #results-screen { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: var(--card-bg); padding: 3rem; border-radius: 24px; width: 100%; max-width: 400px; display: none; box-shadow: 0 20px 40px rgba(0,0,0,0.4); z-index: 10; }
        .stat-val { font-size: 4rem; font-weight: 600; color: var(--accent); margin: 0; }
        .stat-label { color: var(--text-faded); text-transform: uppercase; font-size: 0.8rem; letter-spacing: 0.1em; }
        
        #restart-btn { margin-top: 2rem; background: var(--accent); color: white; border: none; padding: 12px 30px; border-radius: 10px; font-family: var(--font); font-weight: 600; cursor: pointer; width: 100%; transition: 0.2s; }
        #restart-btn:hover { opacity: 0.9; transform: translateY(-2px); }
        .hidden { visibility: hidden; opacity: 0; }

        .mode-settings-container { display: flex; justify-content: center; margin-bottom: 3rem; position: relative; z-index: 50; }
        .mode-group { display: flex; background: var(--card-bg); padding: 4px; border-radius: 10px; gap: 2px; align-items: center; }
        .mode-item { padding: 8px 16px; font-size: 0.85rem; font-weight: 600; color: var(--text-faded); cursor: pointer; border-radius: 8px; transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1); display: flex; align-items: center; gap: 8px; white-space: nowrap; }
        .mode-item:hover { color: var(--text-bright); }
        .mode-item.active { color: var(--accent); background: rgba(255, 255, 255, 0.03); }
        .mode-item.blitz-active { color: #ff4500; text-shadow: 0 0 10px rgba(255, 69, 0, 0.3); }
        .mode-item i { font-size: 0.8rem; }

        /* Dynamic More Layout Overlay Options */
        .dropdown-wrapper { position: relative; display: inline-block; }
        .dropdown-menu { 
            display: none; 
            position: absolute; 
            top: 115%; 
            right: 0; 
            background: var(--card-bg); 
            border-radius: 10px; 
            padding: 6px; 
            box-shadow: 0 12px 28px rgba(0,0,0,0.45); 
            border: 1px solid rgba(255,255,255,0.04); 
            flex-direction: column; 
            gap: 2px; 
            min-width: 145px; 
        }
        .dropdown-menu.show { display: flex; }
        .dropdown-menu .mode-item { justify-content: flex-start; width: 100%; box-sizing: border-box; }
    </style>
</head>
<body>

    <div id="app">
        <div class="mode-settings-container">
            <div class="mode-group" id="mode-nav"></div>
        </div>
        
        <div class="header-stats">
            <div id="mode-stat-container" class="stat-box">
                <i id="mode-icon" class="fa-solid fa-clock"></i> <span id="stat-val">--</span>
            </div>
            <div id="live-wpm-container" class="stat-box">
                <i class="fa-solid fa-bolt"></i> <span id="wpm-val">0</span>
            </div>
            <div id="combo-stat" class="stat-box">
                <i class="fa-solid fa-fire"></i> <span id="combo-val">0</span>
            </div>
        </div>

        <div id="typing-viewport">
            <div id="word-container"></div>
        </div>

        <div id="results-screen">
            <p class="stat-label">Words Per Minute</p>
            <h1 class="stat-val" id="wpm-display">0</h1>
            <p class="stat-label" id="acc-display" style="margin-top: 10px;">Acc: 0%</p>
            <button id="restart-btn" onclick="resetGame()">Restart</button>
        </div>
    </div>

<script>
    const SB_URL = 'https://tzaowqeofmwfnprrfwat.supabase.co';
    const SB_KEY = 'sb_publishable_Sr33ux9FL6QZaJlfhjoqFw_tIwQhSbx';
    const _supabase = supabase.createClient(SB_URL, SB_KEY);

    let availableModes = [];
    let activeModeConfig = null;
    let wordsList = [];

    let isStarted = false;
    let isFinishing = false;
    let activeWordIdx = 0;
    let activeCharIdx = 0;
    let startTime = null;
    let timerInterval = null;
    let correctChars = 0;
    let totalKeystrokes = 0;
    
    let keyPressTimestamps = [];
    let currentCombo = 0;
    let wpmTimeline = [];

    const container = document.getElementById('word-container');
    const statVal = document.getElementById('stat-val');
    const wpmVal = document.getElementById('wpm-val');
    const comboStat = document.getElementById('combo-stat');
    const comboVal = document.getElementById('combo-val');
    const modeIcon = document.getElementById('mode-icon');
    const results = document.getElementById('results-screen');

    // Close options window on blur
    window.addEventListener('click', function() {
        const menu = document.getElementById('overflow-menu');
        if (menu) menu.classList.remove('show');
    });

    async function initModes() {
        try {
            const response = await fetch('../../data/json/modelist.json');
            if(!response.ok) throw new Error("File not found");
            availableModes = await response.json();
            buildNav();
            if (availableModes.length > 0) selectMode(availableModes[0]);
        } catch (e) {
            console.error(e);
            statVal.innerText = "Err";
        }
    }

    function buildNav() {
        const nav = document.getElementById('mode-nav');
        nav.innerHTML = '';
        
        // Overflow threshold limit logic rule
        if (availableModes.length <= 5) {
            availableModes.forEach(mode => {
                nav.appendChild(createModeElement(mode));
            });
        } else {
            // Render first 4 inline directly
            for(let i = 0; i < 4; i++) {
                nav.appendChild(createModeElement(availableModes[i]));
            }

            // Create contextual ellipsis container
            const wrapper = document.createElement('div');
            wrapper.className = 'dropdown-wrapper';

            const moreBtn = document.createElement('div');
            moreBtn.className = 'mode-item';
            moreBtn.id = 'more-toggle-btn';
            moreBtn.innerHTML = `<i class="fa-solid fa-ellipsis"></i> Other`;
            moreBtn.onclick = (e) => {
                e.stopPropagation();
                menu.classList.toggle('show');
            };

            const menu = document.createElement('div');
            menu.className = 'dropdown-menu';
            menu.id = 'overflow-menu';

            // Fill overflow menu with remainder indexes
            for(let i = 4; i < availableModes.length; i++) {
                menu.appendChild(createModeElement(availableModes[i]));
            }

            wrapper.appendChild(moreBtn);
            wrapper.appendChild(menu);
            nav.appendChild(wrapper);
        }
    }

    function createModeElement(mode) {
        const div = document.createElement('div');
        div.className = 'mode-item';
        div.id = `mode-${mode.id}`;
        
        // Dynamically pull icon directly from JSON config values
        let targetIcon = mode.icon || (mode.type === 'time' ? 'fa-clock' : 'fa-font');
        div.innerHTML = `<i class="fa-solid ${targetIcon}"></i> ${mode.label}`;
        
        div.onclick = () => selectMode(mode);
        return div;
    }

    async function selectMode(mode) {
        clearInterval(timerInterval);
        isStarted = false;
        activeModeConfig = mode;

        document.querySelectorAll('.mode-item').forEach(el => el.classList.remove('active', 'blitz-active'));
        const activeEl = document.getElementById(`mode-${mode.id}`);
        const moreToggle = document.getElementById('more-toggle-btn');
        
        if (activeEl) {
            activeEl.classList.add(mode.id === 'blitz' ? 'blitz-active' : 'active');
            
            if (activeEl.parentElement.classList.contains('dropdown-menu') && moreToggle) {
                moreToggle.classList.add('active');
            }
        }

        // Apply alternate logic structural scripts
        container.className = ''; 
        if (mode.script === 'blind') {
            container.classList.add('mode-blind');
        }

        try {
            let rawPath = mode.wordpool || '/data/json/wordlistcommon.json';
            let safeUrl = rawPath.includes('data/') ? '/data/' + rawPath.split('data/')[1] : 
                          (!rawPath.startsWith('/') && !rawPath.startsWith('http') ? '/' + rawPath : rawPath);

            const resp = await fetch(safeUrl);
            if (!resp.ok) throw new Error(`HTTP error! status: ${resp.status}`);
            wordsList = await resp.json();
            if (Array.isArray(wordsList) && wordsList.length > 0) resetGame(); 
            else throw new Error("Wordlist empty");
        } catch (err) {
            console.error("Failed to load words:", err);
            statVal.innerText = "Err";
        }
    }

    function updateCaret() {
        document.querySelectorAll('.active-char, .active-end, .word.active').forEach(el => {
            el.classList.remove('active-char', 'active-end', 'active');
        });

        const words = container.querySelectorAll('.word');
        const currentWord = words[activeWordIdx];
        if (!currentWord) return;

        currentWord.classList.add('active');
        const letters = currentWord.querySelectorAll('.letter');

        if (activeCharIdx < letters.length) {
            letters[activeCharIdx].classList.add('active-char');
        } else {
            currentWord.classList.add('active-end');
        }
    }

    function updateCombo(reset = false) {
        if (reset) {
            currentCombo = 0;
            comboStat.classList.add('broken');
            setTimeout(() => comboStat.classList.remove('broken'), 200);
        } else {
            currentCombo++;
        }
        comboVal.innerText = currentCombo;
    }

    function resetGame() {
        clearInterval(timerInterval);
        isStarted = false;
        isFinishing = false;
        activeWordIdx = 0;
        activeCharIdx = 0;
        correctChars = 0;
        totalKeystrokes = 0;
        startTime = null;
        
        keyPressTimestamps = [];
        wpmTimeline = []; 
        currentCombo = 0;
        comboVal.innerText = "0";
        wpmVal.innerText = "0";

        container.style.top = "0px";
        results.style.display = 'none';
        container.classList.remove('hidden');
        
        let targetIcon = activeModeConfig.icon || (activeModeConfig.type === 'time' ? 'fa-clock' : 'fa-font');
        modeIcon.className = `fa-solid ${targetIcon}`;

        if (activeModeConfig.type === 'time') {
            statVal.innerText = activeModeConfig.value;
        } else {
            statVal.innerText = `0 / ${activeModeConfig.value}`;
        }

        if (!wordsList || wordsList.length === 0) return;

        const count = activeModeConfig.renderCount || 50;
        const shuffled = [...wordsList].sort(() => Math.random() - 0.5).slice(0, count);
        
        container.innerHTML = shuffled.map((w) => `
            <span class="word">
                ${w.split('').map(c => `<span class="letter">${c}</span>`).join('')}
            </span>
        `).join('');

        updateCaret();
    }

    function updateLiveStats() {
        if (!startTime) return;
        const elapsedMs = Date.now() - startTime;
        const durationMinutes = elapsedMs / 60000;
        const currentWpm = Math.round((correctChars / 5) / durationMinutes) || 0;
        wpmVal.innerText = currentWpm;
        
        wpmTimeline.push(currentWpm);

        if (activeModeConfig.type === 'time') {
            let left = Math.ceil(activeModeConfig.value - (elapsedMs / 1000));
            if (left <= 0) {
                left = 0;
                finish();
            }
            statVal.innerText = left;
        }
    }

    window.addEventListener('keydown', (e) => {
        if (results.style.display === 'block' || !activeModeConfig || isFinishing) return;
        
        if (e.key === 'Tab') { e.preventDefault(); resetGame(); return; }
        if (e.key.length !== 1 && e.key !== 'Backspace' && e.key !== ' ') return;
        if (e.key === ' ') e.preventDefault();

        if (!isStarted && e.key.length === 1) {
            isStarted = true;
            startTime = Date.now();
            timerInterval = setInterval(updateLiveStats, 1000);
        }

        const words = container.querySelectorAll('.word');
        const currentWord = words[activeWordIdx];
        if (!currentWord) return;
        const letters = currentWord.querySelectorAll('.letter');

        if (e.key === 'Backspace') {
            // Block structural backspaces in sudden death mode 
            if (activeModeConfig.script === 'sudden_death') return;

            if (activeCharIdx > 0) {
                activeCharIdx--;
                letters[activeCharIdx].className = 'letter';
            } else if (activeWordIdx > 0) {
                activeWordIdx--;
                const prevWord = words[activeWordIdx];
                const prevLetters = prevWord.querySelectorAll('.letter');
                activeCharIdx = prevLetters.length;
                handleScroll(prevWord);
                if (activeModeConfig.type === 'words') statVal.innerText = `${activeWordIdx} / ${activeModeConfig.value}`;
            }
        } else if (e.key === ' ') {
            if (activeCharIdx > 0) {
                if (activeModeConfig.type === 'words' && activeWordIdx + 1 >= activeModeConfig.value) {
                    finish(); return;
                }
                activeWordIdx++;
                activeCharIdx = 0;
                
                if (activeWordIdx < words.length) {
                    handleScroll(words[activeWordIdx]);
                }
                if (activeModeConfig.type === 'words') statVal.innerText = `${activeWordIdx} / ${activeModeConfig.value}`;
            }
        } else if (e.key.length === 1) {
            if (activeCharIdx < letters.length) {
                totalKeystrokes++;
                keyPressTimestamps.push(Date.now());
                
                if (e.key === letters[activeCharIdx].innerText) {
                    letters[activeCharIdx].classList.add('correct');
                    correctChars++;
                    updateCombo(false);
                } else {
                    letters[activeCharIdx].classList.add('incorrect');
                    updateCombo(true);

                    // Alternate Script Hook: Sudden Death Instant summary cutoff breakout
                    if (activeModeConfig.script === 'sudden_death') {
                        finish(true); 
                        return;
                    }
                }
                activeCharIdx++;

                if (activeModeConfig.type === 'words' && activeWordIdx === activeModeConfig.value - 1 && activeCharIdx === letters.length) {
                    finish();
                    return;
                }
            }
        }
        
        updateCaret();
    });

    function handleScroll(activeWord) {
        const offset = activeWord.offsetTop;
        if (offset > 40) container.style.top = `-${offset}px`;
    }

    async function finish(suddenDeathFailed = false) {
        if (isFinishing) return;
        isFinishing = true;

        clearInterval(timerInterval);
        const durationMinutes = (Date.now() - startTime) / 60000;
        
        // Calculate WPM cleanly even for custom failures
        let wpm = Math.round((correctChars / 5) / durationMinutes) || 0;
        if (suddenDeathFailed) wpm = Math.round(correctChars / 5) || 0; // Handle immediate breakdown math edge case

        const acc = totalKeystrokes > 0 ? Math.round((correctChars / totalKeystrokes) * 100) : 0;

        let saved = false;
        let earnedCoins = 0; 
        let isBot = false;
        let isWorthyScore = wpm >= 10 && acc >= 50;

        // Force check alternate non-saved settings flags
        const explicitlySaved = activeModeConfig.isSaved !== false;

        try {
            const { data: { session } } = await _supabase.auth.getSession();
            
            if (keyPressTimestamps.length > 10) {
                let intervals = [];
                for (let i = 1; i < keyPressTimestamps.length; i++) {
                    intervals.push(keyPressTimestamps[i] - keyPressTimestamps[i - 1]);
                }
                let sum = intervals.reduce((a, b) => a + b, 0);
                let avg = sum / intervals.length;
                let variance = intervals.reduce((a, b) => a + Math.pow(b - avg, 2), 0) / intervals.length;
                let stdDev = Math.sqrt(variance);

                if (stdDev < 5 || wpm > 300) {
                    isBot = true;
                }
            }

            // Only run insertion logic if the JSON profile settings allow saves
            if (session && isWorthyScore && !isBot && explicitlySaved) {
                const { error: scoreError } = await _supabase
                    .from('scores')
                    .insert([{ 
                        user_id: session.user.id, 
                        wpm: wpm, 
                        accuracy: acc, 
                        mode: activeModeConfig.id
                    }]);
                
                if (!scoreError) saved = true;

                const { data: coinData, error: coinError } = await _supabase
                    .rpc('reward_coins_for_game', { 
                        wpm_score: wpm, 
                        acc_score: acc,
                        game_mode: activeModeConfig.id 
                    });
                
                if (!coinError) earnedCoins = coinData; 
            }
        } catch (dbError) {
            console.error(dbError);
        }

        sessionStorage.setItem('wpmTimeline', JSON.stringify(wpmTimeline));
        
        window.location.href = `results.html?wpm=${wpm}&acc=${acc}&mode=${activeModeConfig.id}&saved=${saved}&coins=${earnedCoins}&bot=${isBot}&worthy=${isWorthyScore}&isCustomMode=${!explicitlySaved}&failed=${suddenDeathFailed}`;
    }

    initModes();
</script>
</body>
</html>
