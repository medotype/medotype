<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MeDoType | Results</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght=300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/data/css/root.css">
    <script src="../../data/js/theme.js"></script>

    <style>
        body {
            background-color: transparent;
            color: var(--text-bright);
            font-family: var(--font);
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 2rem;
            box-sizing: border-box;
            overflow-y: auto;
        }

        .results-container {
            display: flex;
            gap: 2rem;
            width: 100%;
            max-width: 950px;
            align-items: stretch;
            flex-wrap: wrap;
            animation: fadeIn 0.4s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .results-card {
            background: var(--card-bg);
            padding: 2.5rem;
            border-radius: 24px;
            flex: 1;
            min-width: 300px;
            max-width: 360px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.03);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .mode-tag {
            background: rgba(255, 255, 255, 0.05);
            color: var(--accent);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 0.05em;
            display: inline-block;
            margin: 0 auto 1rem auto;
            text-transform: uppercase;
        }

        .stat-label { color: var(--text-faded); text-transform: uppercase; font-size: 0.75rem; letter-spacing: 0.15em; margin: 0; }
        .stat-val { font-size: 5.5rem; font-weight: 600; color: var(--accent); margin: 0.2rem 0; text-shadow: 0 0 30px rgba(59, 130, 246, 0.2); }
        .acc-val { color: var(--text-bright); font-size: 1.2rem; margin-bottom: 0.5rem; font-weight: 400; }
        
        /* --- Rewards Styles --- */
        .rewards-container { margin-bottom: 1.5rem; display: flex; flex-direction: column; gap: 8px; }
        .coin-reward { color: #eab308; font-size: 0.85rem; font-weight: 600; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .xp-reward { color: #a855f7; font-size: 0.85rem; font-weight: 600; display: flex; align-items: center; justify-content: center; gap: 8px; }
        
        .level-up-msg {
            background: linear-gradient(45deg, #a855f7, #3b82f6);
            color: white;
            padding: 8px;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 800;
            margin-bottom: 1rem;
            animation: bounceIn 0.5s ease;
        }

        @keyframes bounceIn {
            0% { transform: scale(0.8); opacity: 0; }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); opacity: 1; }
        }

        .status-msg { font-size: 0.8rem; margin-bottom: 1.5rem; padding: 10px; border-radius: 8px; width: 100%; box-sizing: border-box; line-height: 1.4; }
        .msg-saved { background: rgba(16, 185, 129, 0.1); color: var(--success); }
        .msg-guest { background: rgba(100, 102, 105, 0.1); color: var(--text-faded); }
        .msg-error { background: rgba(239, 68, 68, 0.1); color: var(--error); border: 1px solid rgba(239, 68, 68, 0.2); }
        .msg-custom { background: rgba(147, 51, 234, 0.1); color: #a855f7; border: 1px solid rgba(147, 51, 234, 0.2); }

        .charts-panel {
            flex: 2;
            min-width: 350px;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .chart-box {
            background: var(--card-bg);
            padding: 1.5rem;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.03);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            height: 220px;
            display: flex;
            flex-direction: column;
        }

        .chart-box h3 {
            margin: 0 0 12px 0;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-faded);
        }

        .chart-wrapper {
            flex: 1;
            position: relative;
            width: 100%;
            height: 100%;
        }

        .btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-family: var(--font);
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            width: 100%;
            transition: 0.2s;
        }

        .btn:hover { filter: brightness(1.1); transform: translateY(-2px); }
    </style>
</head>
<body>

    <div class="results-container">
        <div class="results-card">
            <div class="mode-tag" id="mode-display">Mode: --</div>
            <p class="stat-label">Words Per Minute</p>
            <h1 class="stat-val" id="wpm">0</h1>
            <p class="acc-val" id="acc">ACCURACY: 0%</p>
            
            <div id="rewards-container" class="rewards-container"></div>
            <div id="level-up-container"></div>
            <div id="status-container" class="status-msg">Checking status...</div>
            <div id="action-area"></div>
        </div>

        <div class="charts-panel">
            <div class="chart-box">
                <h3><i class="fa-solid fa-chart-line"></i> Round Pace (WPM over time)</h3>
                <div class="chart-wrapper">
                    <canvas id="paceChart"></canvas>
                </div>
            </div>
            <div class="chart-box">
                <h3><i class="fa-solid fa-clock-rotate-left"></i> Match History (Last 10 Matches)</h3>
                <div class="chart-wrapper">
                    <canvas id="historyChart"></canvas>
                </div>
            </div>
        </div>
    </div>

    <script>
        const SB_URL = 'https://tzaowqeofmwfnprrfwat.supabase.co';
        const SB_KEY = 'sb_publishable_Sr33ux9FL6QZaJlfhjoqFw_tIwQhSbx';
        const _supabase = supabase.createClient(SB_URL, SB_KEY);

        const chartOptions = {
            responsive: true,
            maintainAspectRatio: false,
            plugins: { legend: { display: false } },
            scales: {
                x: { grid: { display: false }, ticks: { color: 'rgba(255,255,255,0.3)', font: { family: 'Inter' } } },
                y: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: 'rgba(255,255,255,0.3)', font: { family: 'Inter' } }, beginAtZero: true }
            }
        };

        async function initResults() {
            const params = new URLSearchParams(window.location.search);
            const wpm = parseInt(params.get('wpm')) || 0;
            const acc = params.get('acc') || 0;
            const modeRaw = params.get('mode') || 'time_15';
            const modeClean = modeRaw.replace('_', ' ');
            const isSaved = params.get('saved') === 'true';
            
            const coins = parseInt(params.get('coins')) || 0;
            const xp = parseInt(params.get('xp')) || 0;
            const leveledUp = params.get('levelup') === 'true';
            
            const isBot = params.get('bot') === 'true';
            const isWorthy = params.get('worthy') !== 'false'; 
            const isCustomMode = params.get('isCustomMode') === 'true';
            const suddenDeathFailed = params.get('failed') === 'true';

            document.getElementById('wpm').innerText = wpm;
            document.getElementById('acc').innerText = `ACCURACY: ${acc}%`;
            document.getElementById('mode-display').innerText = `Mode: ${modeClean}`;

            const rewardsContainer = document.getElementById('rewards-container');
            const levelUpContainer = document.getElementById('level-up-container');
            const statusBox = document.getElementById('status-container');
            const actionArea = document.getElementById('action-area');

            if (isSaved) {
                let rewardsHTML = '';
                if (coins > 0) rewardsHTML += `<div class="coin-reward"><i class="fa-solid fa-coins"></i> +${coins} Coins</div>`;
                if (xp > 0) rewardsHTML += `<div class="xp-reward"><i class="fa-solid fa-star"></i> +${xp} XP</div>`;
                rewardsContainer.innerHTML = rewardsHTML;

                if (leveledUp) {
                    levelUpContainer.innerHTML = `<div class="level-up-msg"><i class="fa-solid fa-arrow-up-right-dots"></i> LEVEL UP!</div>`;
                }
            } else {
                rewardsContainer.style.display = "none";
                document.getElementById('acc').style.marginBottom = "2rem";
            }

            if (isBot) {
                statusBox.innerText = "nice try hacking lil bru";
                statusBox.className = "status-msg msg-error";
                actionArea.innerHTML = `<button class="btn" onclick="location.href='home.html'">Retry Legitimately</button>`;
            } else if (isCustomMode) {
                statusBox.innerText = suddenDeathFailed 
                    ? "Mistake made! Sudden Death active rules triggered instant round termination."
                    : "Mode does not have leaderboard saving.";
                statusBox.className = "status-msg msg-custom";
                actionArea.innerHTML = `<button class="btn" style="background: #a855f7" onclick="location.href='home.html'">Play Again</button>`;
            } else if (!isWorthy) {
                statusBox.innerText = "Score not saved. Gotta type a little better than that to hit the leaderboards!";
                statusBox.className = "status-msg msg-guest";
                actionArea.innerHTML = `<button class="btn" onclick="location.href='home.html'">Practice More</button>`;
            } else if (isSaved) {
                statusBox.innerText = `✓ Score saved to your ${modeClean} profile`;
                statusBox.className = "status-msg msg-saved";
                actionArea.innerHTML = `<button class="btn" onclick="location.href='home.html'">Next Test</button>`;
            } else {
                statusBox.innerText = "⚠ Score not saved. Sign up to track progress.";
                statusBox.className = "status-msg msg-guest";
                actionArea.innerHTML = `<button class="btn" onclick="location.href='home.html'">Continue</button>`;
            }

            renderPaceChart(wpm);
            renderHistoryChart(modeRaw, wpm, isCustomMode);
        }

        function renderPaceChart(currentWpm) {
            const ctx = document.getElementById('paceChart').getContext('2d');
            let timelineData = [];
            try {
                timelineData = JSON.parse(sessionStorage.getItem('wpmTimeline')) || [];
            } catch(e) {}

            if(timelineData.length === 0) timelineData = [0, currentWpm];
            const labels = timelineData.map((_, i) => `${i + 1}s`);
            const accentColor = getComputedStyle(document.documentElement).getPropertyValue('--accent').trim() || '#3b82f6';

            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        data: timelineData,
                        borderColor: accentColor,
                        backgroundColor: 'rgba(59, 130, 246, 0.1)',
                        borderWidth: 3,
                        tension: 0.3,
                        fill: true,
                        pointRadius: timelineData.length > 30 ? 0 : 2
                    }]
                },
                options: chartOptions
            });
        }

        async function renderHistoryChart(modeRaw, currentWpm, isCustomMode) {
            const ctx = document.getElementById('historyChart').getContext('2d');
            let historyData = [];
            let historyLabels = [];

            if (!isCustomMode) {
                try {
                    const { data: { session } } = await _supabase.auth.getSession();
                    if (session) {
                        const { data: scores, error } = await _supabase
                            .from('scores')
                            .select('wpm, id')
                            .eq('user_id', session.user.id)
                            .eq('mode', modeRaw)
                            .order('id', { ascending: false })
                            .limit(10);

                        if (!error && scores && scores.length > 0) {
                            historyData = scores.map(s => s.wpm).reverse();
                            historyLabels = historyData.map((_, i) => `Match ${i + 1}`);
                        }
                    }
                } catch (err) {
                    console.error(err);
                }
            }

            if (historyData.length === 0) {
                historyData = [currentWpm];
                historyLabels = ['Unranked Match'];
            }

            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: historyLabels,
                    datasets: [{
                        data: historyData,
                        borderColor: '#10b981', 
                        backgroundColor: 'rgba(16, 185, 129, 0.1)',
                        borderWidth: 3,
                        tension: 0.3,
                        fill: true,
                        pointRadius: 4
                    }]
                },
                options: chartOptions
            });
        }

        initResults();
        window.addEventListener('keydown', (e) => { if (e.key === 'Enter') location.href = 'home.html'; });
    </script>
</body>
</html>
