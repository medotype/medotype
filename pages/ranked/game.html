<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MeDoType | Ranked Match</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="../../data/css/root.css">
    <script src="../../data/js/theme.js"></script>
    
    <style>
        body { 
            background-color: var(--bg); 
            color: var(--text-bright); 
            font-family: var(--font); 
            margin: 0; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            overflow: hidden; 
        }
        
        #app { 
            width: 100%; 
            max-width: 850px; 
            text-align: center; 
            padding: 2rem; 
            position: relative; 
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Match Header */
        .match-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            background: var(--card-bg);
            padding: 15px 30px;
            border-radius: 16px;
            margin-bottom: 2rem;
            box-sizing: border-box;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .player-info {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .player-info.right { text-align: right; }

        .player-name { font-weight: 600; font-size: 1.2rem; color: var(--text-bright); }
        .player-score { font-size: 0.9rem; color: var(--accent); font-weight: 600; }
        
        .round-info {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }
        .round-text { font-size: 1.5rem; font-weight: 800; color: var(--text-bright); letter-spacing: 0.05em; }
        .round-status { font-size: 0.8rem; color: var(--text-faded); text-transform: uppercase; font-weight: 600; }

        #typing-viewport { height: 90px; overflow: hidden; position: relative; margin-bottom: 2rem; width: 100%; }
        #word-container { display: flex; flex-wrap: wrap; gap: 14px; justify-content: center; align-items: center; position: relative; top: 0; transition: top 0.25s cubic-bezier(0.4, 0, 0.2, 1); }
        
        .word { font-size: 2rem; font-weight: 400; color: var(--text-faded); letter-spacing: -0.02em; position: relative; display: inline-block; white-space: nowrap; }        
        .letter { position: relative; transition: color 0.1s ease; }
        .letter.correct { color: var(--text-bright); }
        .letter.incorrect { color: var(--error); border-bottom: 2px solid var(--error); }
        
        .letter.active-char::before { content: ''; position: absolute; left: -2px; top: 15%; height: 70%; width: 2px; background-color: var(--accent); animation: blink 1s infinite; border-radius: 2px; }
        .word.active-end::after { content: ''; position: absolute; right: -6px; top: 15%; height: 70%; width: 2px; background-color: var(--accent); animation: blink 1s infinite; border-radius: 2px; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

        #overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(18, 18, 19, 0.85);
            backdrop-filter: blur(8px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        #overlay h1 { font-size: 5rem; margin: 0; color: var(--accent); font-weight: 800; }
        #overlay p { color: var(--text-bright); font-size: 1.2rem; font-weight: 600; margin-top: 10px; }

        .hidden { display: none !important; }

        /* Final Results */
        .results-card {
            background: var(--card-bg);
            padding: 3rem;
            border-radius: 24px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .winner-text { font-size: 2.5rem; font-weight: 800; color: var(--accent); margin: 0 0 10px 0; }
        .elo-change { font-size: 1.2rem; font-weight: 600; color: #10b981; margin-bottom: 2rem; }
        .elo-change.negative { color: var(--error); }
        
        .btn-home { background: var(--accent); color: white; border: none; padding: 12px 30px; border-radius: 10px; font-family: var(--font); font-weight: 600; cursor: pointer; width: 100%; font-size: 1.1rem; transition: 0.2s; }
        .btn-home:hover { opacity: 0.9; transform: translateY(-2px); }

    </style>
</head>
<body>

    <div id="app">
        
        <div class="match-header">
            <div class="player-info">
                <span class="player-name" id="my-name">Me</span>
                <span class="player-score">Score: <span id="my-score">0</span></span>
            </div>
            <div class="round-info">
                <span class="round-text">ROUND <span id="round-display">1</span></span>
                <span class="round-status" id="round-status">Connecting...</span>
            </div>
            <div class="player-info right">
                <span class="player-name" id="opp-name">Opponent</span>
                <span class="player-score">Score: <span id="opp-score">0</span></span>
            </div>
        </div>

        <div id="typing-viewport">
            <div id="word-container"></div>
        </div>

        <div id="overlay">
            <h1 id="overlay-title">...</h1>
            <p id="overlay-sub">Waiting for opponent...</p>
        </div>

        <div id="results-screen" class="hidden overlay">
            <div class="results-card">
                <h1 class="winner-text" id="final-result">YOU WIN!</h1>
                <div class="elo-change" id="elo-change-text">+25 Elo</div>
                <button class="btn-home" onclick="window.location.href='home.html'">Back to Home</button>
            </div>
        </div>

    </div>

    <script>
const SB_URL = 'https://tzaowqeofmwfnprrfwat.supabase.co';
    const SB_KEY = 'sb_publishable_Sr33ux9FL6QZaJlfhjoqFw_tIwQhSbx';
    const _supabase = supabase.createClient(SB_URL, SB_KEY);

    const matchId = new URLSearchParams(window.location.search).get('id') || window.location.search.replace('?', '');
    let matchChannel;
    
    let myId, myUsername, myElo;
    let oppId = null, oppUsername = "Opponent", oppElo = 0;
    
    let gameState = 'WAITING'; 
    const TOTAL_ROUNDS = 4;
    const WORDS_PER_ROUND = 15;
    let currentRound = 1;
    let allWords = [];
    let isGeneratingWords = false; 
    
    let syncInterval = null;
    let lastOpponentActivity = Date.now(); 

    let myTotalScore = 0;
    let oppTotalScore = 0;

    let activeWordIdx = 0;
    let activeCharIdx = 0;
    let isStarted = false;
    let startTime = null;
    let correctChars = 0;
    let totalKeystrokes = 0;
    let myRoundFinished = false;
    let oppRoundFinished = false;

    const container = document.getElementById('word-container');
    const overlay = document.getElementById('overlay');
    const overlayTitle = document.getElementById('overlay-title');
    const overlaySub = document.getElementById('overlay-sub');
    const statusText = document.getElementById('round-status');

    const fallbackWords = "the be to of and a in that have I it for not on with he as you do at this but his by from they we say her she or an will my one all would there their what so up out if about who get which go me when make can like time no just him know take people into year your good some could them see other than then now look only come its over think also back after use two how our work first well way even new want because any these give day most us".split(" ");

    async function initMatch() {
        console.log("[INIT] Initializing match logic. ID:", matchId);
        if (!matchId) return window.location.href = 'home.html';

        const { data: { session }, error: sessionErr } = await _supabase.auth.getSession();
        if (sessionErr || !session) {
            console.error("[INIT] Failed to retrieve authentication session:", sessionErr);
            return window.location.href = 'home.html';
        }
        myId = session.user.id;
        console.log("[INIT] Authenticated as User UUID:", myId);

        // Fetch profile
        const { data: profile, error: profileErr } = await _supabase.from('profiles').select('username, elo').eq('id', myId).single();
        if (profileErr) console.warn("[INIT] Profile load warning/error:", profileErr);
        
        myUsername = profile?.username || "Me";
        myElo = profile?.elo || 0;
        
        const myNameEl = document.getElementById('my-name');
        if (myNameEl) {
            myNameEl.innerText = myUsername;
        }

        console.log("[INIT] Subscribing to Supabase Realtime channel: match_" + matchId);
        
        matchChannel = _supabase.channel(`match_${matchId}`, {
            config: { broadcast: { self: false } }
        });

        matchChannel.on('broadcast', { event: 'player_joined' }, handlePlayerJoined)
                    .on('broadcast', { event: 'game_words' }, handleGameWords)
                    .on('broadcast', { event: 'player_ready' }, handlePlayerReady)
                    .on('broadcast', { event: 'round_finished' }, handleRoundFinished)
                    .on('broadcast', { event: 'player_heartbeat' }, handlePlayerHeartbeat) 
                    .on('broadcast', { event: 'player_left' }, handlePlayerLeft)          
                    .subscribe(async (status, err) => {
                        if (err) console.error("[REALTIME] Subscription Error:", err);
                        console.log("[REALTIME] Connection Status changed to:", status);
                        
                        if (status === 'SUBSCRIBED') {
                            console.log("[REALTIME] Channel verified. Starting heartbeat synchronization loop.");
                            statusText.innerText = "Searching for opponent...";
                            syncInterval = setInterval(syncGame, 1000);
                        }
                    });
    }

    async function syncGame() {
        if (gameState === 'GAME_OVER') return;

        if (gameState === 'WAITING') {
            console.log("[SYNC] Broadcasting presence payload to the room...");
            matchChannel.send({
                type: 'broadcast',
                event: 'player_joined',
                payload: { id: myId, username: myUsername, elo: myElo }
            });

            if (oppId && myId > oppId) {
                if (allWords.length === 0) {
                    if (!isGeneratingWords) {
                        console.log("[SYNC] Host role assumed. Generating new match vocabulary.");
                        await generateWordsLocal();
                    }
                } else {
                    console.log("[SYNC] Sending vocabulary list payload to guest peer.");
                    matchChannel.send({
                        type: 'broadcast',
                        event: 'game_words',
                        payload: { words: allWords }
                    });
                }
            }
        } 
        else if (gameState === 'COUNTDOWN' || gameState === 'PLAYING' || gameState === 'ROUND_OVER') {
            matchChannel.send({
                type: 'broadcast',
                event: 'player_heartbeat',
                payload: { id: myId }
            });

            if (oppId && (Date.now() - lastOpponentActivity > 60000)) {
                console.warn("[TIMEOUT] Opponent dropped connections or went AFK for 60s.");
                handleOpponentForfeit('AFK');
            }
        }
    }

    async function removeFromQueue() {
        if (!myId) return;
        console.log("[QUEUE] Cleansing match database queue tables for user:", myId);
        await _supabase.from('queue').delete().eq('user_id', myId);
    }

    function handlePlayerJoined({ payload }) {
        console.log("[EVENT] Received 'player_joined' broadcast message payload:", payload);
        if (payload.id !== myId && !oppId) {
            oppId = payload.id;
            oppUsername = payload.username;
            oppElo = payload.elo;
            document.getElementById('opp-name').innerText = oppUsername;
            lastOpponentActivity = Date.now(); 
            console.log(`[EVENT] Opponent discovered! Name: ${oppUsername} | ID: ${oppId}`);
            statusText.innerText = "Syncing with opponent...";
        }
    }

    async function generateWordsLocal() {
        isGeneratingWords = true;
        let fetchedWords = fallbackWords;
        try {
            const resp = await fetch('../../data/json/wordlistcommon.json');
            if (resp.ok) {
                fetchedWords = await resp.json();
                console.log("[WORDS] Loaded word list source successfully.");
            }
        } catch(e) {}

        allWords = fetchedWords.sort(() => Math.random() - 0.5).slice(0, TOTAL_ROUNDS * WORDS_PER_ROUND);
        console.log("[WORDS] Generated game words array:", allWords);
        isGeneratingWords = false;
    }

    function handleGameWords({ payload }) {
        if (gameState !== 'WAITING') {
            if (gameState === 'COUNTDOWN' || gameState === 'PLAYING') {
                console.log("[EVENT] Host re-sent words. Re-transmitting ready acknowledgment.");
                matchChannel.send({ type: 'broadcast', event: 'player_ready' });
            }
            return;
        }

        console.log("[EVENT] Received 'game_words' package distribution from remote host:", payload.words);
        allWords = payload.words;
        lastOpponentActivity = Date.now();
        
        console.log("[EVENT] Dispatched readiness handshake affirmation message back to host.");
        matchChannel.send({
            type: 'broadcast',
            event: 'player_ready'
        });
        
        removeFromQueue();
        startRoundSequence();
    }

    function handlePlayerReady() {
        if (gameState !== 'WAITING') return;
        console.log("[EVENT] Received confirmation handshake acknowledgment from guest client.");
        lastOpponentActivity = Date.now();
        
        removeFromQueue(); 
        startRoundSequence();
    }

    function handlePlayerHeartbeat({ payload }) {
        if (payload.id === oppId) {
            lastOpponentActivity = Date.now();
        }
    }

    function handlePlayerLeft({ payload }) {
        if (payload.id === oppId && gameState !== 'GAME_OVER') {
            console.warn("[EVENT] Opponent explicitly abandoned or closed the match window.");
            handleOpponentForfeit('LEFT');
        }
    }

    // Handles processing forfeit/AFK conditions out of the box safely
    async function handleOpponentForfeit(reason) {
        gameState = 'GAME_OVER';
        clearInterval(syncInterval); // Kill checking tracking threads
        
        overlay.style.display = 'none';
        document.getElementById('typing-viewport').style.display = 'none';
        document.querySelector('.match-header').style.display = 'none';

        const resultsScreen = document.getElementById('results-screen');
        const resultText = document.getElementById('final-result');
        const eloText = document.getElementById('elo-change-text');

        resultsScreen.classList.remove('hidden');

        resultText.innerText = "VICTORY";
        resultText.style.color = "#10b981";
        
        if (reason === 'AFK') {
            statusText.innerText = "Opponent went AFK. You win!";
            eloText.innerText = "+25 Elo (Opponent AFK)";
        } else {
            statusText.innerText = "Opponent left midmatch. You win!";
            eloText.innerText = "+25 Elo (Opponent Abandoned)";
        }
        eloText.className = "elo-change";
        
        let newElo = myElo + 25;
        await _supabase.from('profiles').update({ elo: newElo }).eq('id', myId);

        await removeFromQueue(); 
        _supabase.removeChannel(matchChannel);
    }

    function startRoundSequence() {
        console.log(`[ROUND] Transitioning to round sequencing context. Current: ${currentRound}`);
        gameState = 'COUNTDOWN';
        myRoundFinished = false;
        oppRoundFinished = false;
        
        const roundWords = allWords.slice((currentRound - 1) * WORDS_PER_ROUND, currentRound * WORDS_PER_ROUND);
        container.innerHTML = roundWords.map((w) => `
            <span class="word">
                ${w.split('').map(c => `<span class="letter">${c}</span>`).join('')}
            </span>
        `).join('');
        
        container.style.top = "0px";
        activeWordIdx = 0;
        activeCharIdx = 0;
        correctChars = 0;
        totalKeystrokes = 0;
        isStarted = false;
        startTime = null;

        document.getElementById('round-display').innerText = currentRound;
        statusText.innerText = "Get Ready!";
        overlay.classList.remove('hidden');
        overlaySub.innerText = `Round ${currentRound} of ${TOTAL_ROUNDS}`;

        updateCaret();

        let count = 3;
        overlayTitle.innerText = count;
        const countInterval = setInterval(() => {
            count--;
            if (count > 0) {
                overlayTitle.innerText = count;
            } else if (count === 0) {
                overlayTitle.innerText = "GO!";
            } else {
                clearInterval(countInterval);
                overlay.classList.add('hidden');
                gameState = 'PLAYING';
                statusText.innerText = "Typing...";
                console.log("[ROUND] Countdown sequence expired. Input collection enabled.");
            }
        }, 1000);
    }

    window.addEventListener('keydown', (e) => {
        if (gameState !== 'PLAYING') return;
        if (e.key === 'Tab') { e.preventDefault(); return; }
        if (e.key.length !== 1 && e.key !== 'Backspace' && e.key !== ' ') return;
        if (e.key === ' ') e.preventDefault();

        if (!isStarted && e.key.length === 1) {
            isStarted = true;
            startTime = Date.now();
        }

        const words = container.querySelectorAll('.word');
        const currentWord = words[activeWordIdx];
        if (!currentWord) return;
        const letters = currentWord.querySelectorAll('.letter');

        if (e.key === 'Backspace') {
            if (activeCharIdx > 0) {
                activeCharIdx--;
                letters[activeCharIdx].className = 'letter';
            } else if (activeWordIdx > 0) {
                activeWordIdx--;
                const prevWord = words[activeWordIdx];
                const prevLetters = prevWord.querySelectorAll('.letter');
                activeCharIdx = prevLetters.length;
                handleScroll(prevWord);
            }
        } else if (e.key === ' ') {
            if (activeCharIdx > 0) {
                if (activeWordIdx + 1 >= WORDS_PER_ROUND) {
                    finishTyping(); return;
                }
                activeWordIdx++;
                activeCharIdx = 0;
                handleScroll(words[activeWordIdx]);
            }
        } else if (e.key.length === 1) {
            if (activeCharIdx < letters.length) {
                totalKeystrokes++;
                if (e.key === letters[activeCharIdx].innerText) {
                    letters[activeCharIdx].classList.add('correct');
                    correctChars++;
                } else {
                    letters[activeCharIdx].classList.add('incorrect');
                }
                activeCharIdx++;

                if (activeWordIdx === WORDS_PER_ROUND - 1 && activeCharIdx === letters.length) {
                    finishTyping(); return;
                }
            }
        }
        updateCaret();
    });

    function updateCaret() {
        document.querySelectorAll('.active-char, .active-end, .word.active').forEach(el => {
            el.classList.remove('active-char', 'active-end', 'active');
        });
        const words = container.querySelectorAll('.word');
        const currentWord = words[activeWordIdx];
        if (!currentWord) return;

        currentWord.classList.add('active');
        const letters = currentWord.querySelectorAll('.letter');

        if (activeCharIdx < letters.length) {
            letters[activeCharIdx].classList.add('active-char');
        } else {
            currentWord.classList.add('active-end');
        }
    }

    function handleScroll(activeWord) {
        const offset = activeWord.offsetTop;
        if (offset > 40) container.style.top = `-${offset}px`;
    }

    function finishTyping() {
        gameState = 'ROUND_OVER';
        const durationMinutes = (Date.now() - startTime) / 60000;
        const wpm = Math.round((correctChars / 5) / durationMinutes) || 0;
        const acc = totalKeystrokes > 0 ? Math.round((correctChars / totalKeystrokes) * 100) : 0;
        
        const roundScore = wpm + acc;
        myTotalScore += roundScore;
        
        document.getElementById('my-score').innerText = myTotalScore;
        statusText.innerText = `You scored ${roundScore}! Waiting...`;

        console.log(`[MATCH] Finished typing calculations. Score: ${roundScore}. Dispatched 'round_finished'.`);
        matchChannel.send({
            type: 'broadcast',
            event: 'round_finished',
            payload: { id: myId, score: roundScore }
        });

        myRoundFinished = true;
        checkRoundAdvance();
    }

    function handleRoundFinished({ payload }) {
        console.log("[EVENT] Peer transmitted 'round_finished' alert message block.", payload);
        if (payload.id === oppId) {
            oppTotalScore += payload.score;
            document.getElementById('opp-score').innerText = oppTotalScore;
            lastOpponentActivity = Date.now(); 
            oppRoundFinished = true;
            checkRoundAdvance();
        }
    }

    function checkRoundAdvance() {
        if (myRoundFinished && oppRoundFinished) {
            currentRound++;
            if (currentRound > TOTAL_ROUNDS) {
                endMatch();
            } else {
                statusText.innerText = "Both finished. Next round...";
                console.log("[ROUND] Both players checked in. Progressing match map state sequence indices.");
                setTimeout(() => startRoundSequence(), 2000);
            }
        }
    }

    async function endMatch() {
        console.log("[MATCH] All matches complete. Resolving competitive session results screen.");
        gameState = 'GAME_OVER';
        clearInterval(syncInterval); 
        overlay.style.display = 'none';
        
        const resultsScreen = document.getElementById('results-screen');
        const resultText = document.getElementById('final-result');
        const eloText = document.getElementById('elo-change-text');

        resultsScreen.classList.remove('hidden');
        
        document.getElementById('typing-viewport').style.display = 'none';
        document.querySelector('.match-header').style.display = 'none';
        
        let newElo = myElo;
        
        if (myTotalScore > oppTotalScore) {
            resultText.innerText = "VICTORY";
            resultText.style.color = "#10b981";
            eloText.innerText = "+25 Elo";
            eloText.className = "elo-change";
            newElo += 25;
        } else if (myTotalScore < oppTotalScore) {
            resultText.innerText = "DEFEAT";
            resultText.style.color = "var(--error)";
            eloText.innerText = "-25 Elo";
            eloText.className = "elo-change negative";
            newElo = Math.max(0, newElo - 25);
        } else {
            resultText.innerText = "DRAW";
            resultText.style.color = "var(--text-bright)";
            eloText.innerText = "+0 Elo";
            eloText.className = "elo-change";
        }

        if (newElo !== myElo) {
            console.log(`[DATABASE] Updating profile statistics dynamically. New ELO target: ${newElo}`);
            await _supabase.from('profiles').update({ elo: newElo }).eq('id', myId);
        }

        await removeFromQueue(); 
        console.log("[CLEANUP] Channel state unsubscription routine launched.");
        _supabase.removeChannel(matchChannel);
    }

    window.addEventListener('beforeunload', () => {
        if (myId) {
            _supabase.from('queue').delete().eq('user_id', myId);
        }
        if (matchChannel && gameState !== 'GAME_OVER' && oppId) {
            matchChannel.send({
                type: 'broadcast',
                event: 'player_left',
                payload: { id: myId }
            });
        }
    });

    initMatch();
    </script>
</body>
</html>
