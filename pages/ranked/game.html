<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MeDoType | Ranked Match</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="../../data/css/root.css">
    <link rel="stylesheet" href="game.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="../../data/js/theme.js"></script>
</head>
<body>

    <div id="damage-overlay"></div>

    <div id="action-text"></div>

    <div id="app">
        <div class="match-header">
            <div class="player-info">
                <span class="player-name" id="my-name">Me</span>
                <span class="player-score">Score: <span id="my-score">0</span></span>
                <div id="combo-stat" style="color: var(--accent); font-weight: 600; margin-top: 5px;">
                    <i class="fa-solid fa-fire"></i> <span id="combo-val">0</span>
                </div>
            </div>
            
            <div class="round-info">
                <span class="round-text">ROUND <span id="round-display">1</span></span>
                <span class="round-status" id="round-status">Connecting...</span>
            </div>

            <div class="player-info right">
                <span class="player-name" id="opp-name">Opponent</span>
                <span class="player-score">Score: <span id="opp-score">0</span></span>
            </div>
        </div>

        <div class="battle-track-container" id="battle-track-container" style="display: none;">
            <div class="track my-track">
                <div class="runner" id="my-runner">YOU</div>
            </div>
            <div class="track opp-track">
                <div class="runner opp-runner" id="opp-runner">OPP</div>
            </div>
        </div>

        <div id="typing-viewport">
            <div id="word-container"></div>
        </div>

        <div id="overlay">
            <h1 id="overlay-title">...</h1>
            <p id="overlay-sub">Waiting for opponent...</p>
        </div>

<div id="round-results-overlay">
            <h2 style="font-size: 2rem; margin:0; color: var(--text-bright);">Round Complete!</h2>
            <div class="round-scores-flex">
                <div class="round-score-card">
                    <h3>You</h3>
                    <div class="round-pts" id="anim-my-score">0</div>
                </div>
                <div class="round-score-card">
                    <h3>Opponent</h3>
                    <div class="round-pts" id="anim-opp-score">0</div>
                </div>
            </div>
        </div>

        <div id="results-screen" class="hidden overlay">
            <div class="results-container">
                
                <div class="results-card">
                    <div class="mode-tag" id="mode-display">Ranked Match</div>
                    <p class="stat-label">Match Outcome</p>
                    <h1 class="stat-val" id="final-result">VICTORY</h1>
                    <p class="acc-val" id="elo-change-text">+25 Elo</p>
                    
                    <div class="coin-reward" id="coin-reward-text" style="display: none;">
                        <i class="fa-solid fa-coins"></i> +0 Coins
                    </div>
                    
                    <div class="results-buttons">
                        <button class="btn-home" onclick="window.location.href='../../../pages/home.html'">Lobby</button>
                        <button class="btn-play-again" onclick="window.location.href='../../../pages/home.html'">Play Again <i class="fa-solid fa-rotate-right"></i></button>
                    </div>
                </div>

                <div class="charts-panel">
                    <div class="chart-box">
                        <h3><i class="fa-solid fa-chart-line"></i> Match Pace (WPM Delta)</h3>
                        <div class="chart-wrapper">
                            <canvas id="matchChart"></canvas>
                        </div>
                    </div>
                </div>

            </div>
        </div>

    </div>

    <script src="game.js"></script>
</body>
</html>

    </div>

    <script src="game.js"></script>
</body>
</html>
