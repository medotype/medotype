<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MeDoType | Ranked</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="../../data/css/root.css">
    <script src="../../data/js/theme.js"></script>
    
    <style>
        body { 
            background-color: var(--bg); 
            color: var(--text-bright); 
            font-family: var(--font); 
            margin: 0; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            overflow: hidden; 
        }
        
        #app { 
            width: 100%; 
            max-width: 850px; 
            text-align: center; 
            padding: 2rem; 
            position: relative; 
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Clean Header Stats for Username & Elo */
        .header-stats { 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            gap: 40px; 
            width: 100%; 
            margin-bottom: 3rem; 
            height: 2rem; 
            opacity: 0; /* Hidden until loaded */
            transition: opacity 0.3s ease;
        }
        
        .stat-box {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 1.3rem;
            font-weight: 500;
            color: var(--text-faded);
            justify-content: center;
            font-variant-numeric: tabular-nums;
        }
        
        .stat-box i { color: var(--accent); font-size: 1.1rem; }

        /* Minimal Ranked Title */
        .ranked-title {
            font-size: 2.5rem;
            font-weight: 600;
            margin: 0 0 2rem 0;
            letter-spacing: -0.02em;
            color: var(--text-bright);
        }

        /* Action Bar */
        .action-bar {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-bottom: 2rem;
        }

        .btn {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 28px;
            border-radius: 10px;
            border: none;
            font-family: var(--font);
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .btn-play { 
            background: var(--accent); 
            color: white; 
        }
        
        .btn-play:hover { 
            transform: translateY(-2px); 
            opacity: 0.9;
        }

        .btn-play:active {
            transform: translateY(0);
        }

        .btn-shop { 
            background: var(--card-bg); 
            color: var(--text-faded); 
        }

        .btn-shop:not(.btn-locked):hover {
            color: var(--text-bright);
            transform: translateY(-2px);
        }

        .btn-cancel { 
            background: var(--error) !important; 
            color: white;
        }
        
        .btn-cancel:hover {
            opacity: 0.9;
        }

        /* Lock Overlay Logic */
        .icon-wrapper {
            position: relative;
            display: inline-flex;
        }

        .lock-badge {
            position: absolute;
            bottom: -4px;
            right: -6px;
            font-size: 0.7rem;
            color: var(--error);
            opacity: 0;
            transform: scale(0.5);
            transition: all 0.2s ease;
        }

        .btn-locked {
            opacity: 0.4;
            cursor: not-allowed;
            pointer-events: none; 
        }

        .btn-locked .lock-badge {
            opacity: 1;
            transform: scale(1);
        }

        #queue-status {
            display: none; 
            align-items: center; 
            justify-content: center;
            gap: 12px;
            animation: fadeIn 0.3s ease;
        }

        .spinner {
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-top: 2px solid var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        .queue-text {
            display: flex;
            flex-direction: column;
            text-align: left;
        }

        /* Error Toast */
        #error-toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translate(-50%, -150px);
            background: var(--error);
            color: white;
            padding: 12px 24px;
            border-radius: 10px;
            font-weight: 600;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 10px;
            z-index: 100;
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        #error-toast.show { transform: translate(-50%, 0); }
        
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div id="error-toast">
        <i class="fa-solid fa-circle-exclamation"></i>
        <span id="error-text">Error message</span>
    </div>

    <div id="app">
        <div class="header-stats" id="profile-stats">
            <div class="stat-box">
                <i class="fa-solid fa-user"></i> <span id="username-display">Loading...</span>
            </div>
            <div class="stat-box">
                <i class="fa-solid fa-trophy"></i> <span id="elo-display">-- Elo</span>
            </div>
        </div>

        <h1 class="ranked-title">Ranked Matchmaking</h1>

        <div class="action-bar">
            <button class="btn btn-play" id="main-btn" onclick="handleQueue()">
                <i class="fa-solid fa-play" id="btn-icon"></i> <span id="btn-text">Find Match</span>
            </button>
            <button class="btn btn-shop" id="shop-btn">
                <span class="icon-wrapper">
                    <i class="fa-solid fa-cart-shopping" id="shop-icon"></i>
                    <i class="fa-solid fa-lock lock-badge"></i>
                </span>
                Shop
            </button>
        </div>

        <div id="queue-status">
            <div class="spinner"></div>
            <div class="queue-text">
                <span style="font-size: 0.7rem; color: var(--text-faded); font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em;">Searching</span>
                <span id="queue-timer" style="font-size: 1rem; color: var(--accent); font-weight: 600; font-variant-numeric: tabular-nums;">00:00</span>
            </div>
        </div>
    </div>

    <script>
        const SB_URL = 'https://tzaowqeofmwfnprrfwat.supabase.co';
        const SB_KEY = 'sb_publishable_Sr33ux9FL6QZaJlfhjoqFw_tIwQhSbx';
        const _supabase = supabase.createClient(SB_URL, SB_KEY);

        let currentElo = 0;
        let currentUsername = "Player";
        
        let isQueueing = false;
        let queueInterval;
        let seconds = 0;
        let queueId = null;
        let queueSubscription = null;
        let errorTimeout;

        async function loadUserProfile() {
            const { data: { session } } = await _supabase.auth.getSession();
            if (!session) return;

            const { data: profile, error } = await _supabase
                .from('profiles')
                .select('elo, username')
                .eq('id', session.user.id)
                .single();

            if (profile) {
                currentElo = profile.elo || 0;
                currentUsername = profile.username || "Player";
                
                document.getElementById('username-display').innerText = currentUsername;
                document.getElementById('elo-display').innerText = `${currentElo}`;
                document.getElementById('profile-stats').style.opacity = '1';
            }
        }

        function showError(message) {
            const toast = document.getElementById('error-toast');
            document.getElementById('error-text').innerText = message;
            toast.classList.add('show');
            clearTimeout(errorTimeout);
            errorTimeout = setTimeout(() => toast.classList.remove('show'), 3000);
        }

        function startTimer() {
            seconds = 0;
            const timerDisplay = document.getElementById('queue-timer');
            queueInterval = setInterval(() => {
                seconds++;
                const mins = Math.floor(seconds / 60).toString().padStart(2, '0');
                const secs = (seconds % 60).toString().padStart(2, '0');
                timerDisplay.innerText = `${mins}:${secs}`;
            }, 1000);
        }

        function stopTimer() {
            clearInterval(queueInterval);
            document.getElementById('queue-timer').innerText = "00:00";
        }

        async function handleQueue() {
            const { data: { session } } = await _supabase.auth.getSession();
            
            if (!session) return showError("To play ranked, please log in.");

            const btn = document.getElementById('main-btn');
            const btnText = document.getElementById('btn-text');
            const btnIcon = document.getElementById('btn-icon');
            const statusDiv = document.getElementById('queue-status');
            const shopBtn = document.getElementById('shop-btn');

            isQueueing = !isQueueing;

            if (isQueueing) {
                btn.classList.add('btn-cancel');
                btnText.innerText = "Cancel Queue";
                btnIcon.className = "fa-solid fa-xmark";
                shopBtn.classList.add('btn-locked');
                
                statusDiv.style.display = 'flex';
                startTimer();

                const { data, error } = await _supabase
                    .from('ranked_queue')
                    .insert([{ 
                        user_id: session.user.id, 
                        username: currentUsername,
                        elo: currentElo
                    }])
                    .select();

                if (error) {
                    stopQueueUI();
                    return showError("Failed to join queue. Try again.");
                }
                queueId = data[0].id;

                queueSubscription = _supabase
                    .channel(`q_${queueId}`)
                    .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'ranked_queue', filter: `id=eq.${queueId}` }, 
                    payload => {
                        if (payload.new.status === 'matched') matchFound(payload.new.match_id);
                    }).subscribe();

                checkNearbyPlayers(session.user.id);

            } else {
                stopQueueUI();
            }
        }

        async function stopQueueUI() {
            const btn = document.getElementById('main-btn');
            const btnText = document.getElementById('btn-text');
            const btnIcon = document.getElementById('btn-icon');
            const statusDiv = document.getElementById('queue-status');
            const shopBtn = document.getElementById('shop-btn');

            isQueueing = false;
            btn.classList.remove('btn-cancel');
            btnText.innerText = "Find Match";
            btnIcon.className = "fa-solid fa-play";
            shopBtn.classList.remove('btn-locked');
            
            statusDiv.style.display = 'none';
            stopTimer();

            if (queueId) {
                await _supabase.from('ranked_queue').delete().eq('id', queueId);
                queueId = null;
            }
            if (queueSubscription) _supabase.removeChannel(queueSubscription);
        }

        async function checkNearbyPlayers(myId) {
            // Build query base
            let query = _supabase
                .from('ranked_queue')
                .select('*')
                .eq('status', 'searching')
                .neq('id', queueId); // Prevent matching this exact browser tab row

            // If NOT on your beta domain, prevent users from matching with themselves
            if (!window.location.href.includes('medotypebeta.wasmer.app')) {
                query = query.neq('user_id', myId);
            }

            const { data: opponents } = await query
                .order('created_at', { ascending: true })
                .limit(1);

            if (opponents && opponents.length > 0) {
                const opponent = opponents[0];
                const sharedMatchId = crypto.randomUUID();
                await _supabase.from('ranked_queue')
                    .update({ status: 'matched', match_id: sharedMatchId })
                    .in('id', [queueId, opponent.id]);
            }
        }

        function matchFound(matchId) {
            stopTimer();
            document.getElementById('btn-text').innerText = "MATCH FOUND!";
            document.getElementById('main-btn').style.background = "var(--accent)";
            setTimeout(() => { window.location.href = `game.html?id=${matchId}`; }, 2000);
        }

        loadUserProfile();
    </script>
</body>
</html>
