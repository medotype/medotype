<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MeDoType | Ranked & 1v1</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="../../data/css/root.css">
    <script src="../../data/js/theme.js"></script>
    
    <style>
        body { 
            background-color: var(--bg); 
            color: var(--text-bright); 
            font-family: var(--font); 
            margin: 0; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            overflow: hidden; 
        }
        
        #app { 
            width: 100%; 
            max-width: 850px; 
            text-align: center; 
            padding: 2rem; 
            position: relative; 
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header-stats { 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            gap: 40px; 
            width: 100%; 
            margin-bottom: 3rem; 
            height: 2rem; 
            opacity: 0; 
            transition: opacity 0.3s ease;
        }
        
        .stat-box {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 1.3rem;
            font-weight: 500;
            color: var(--text-faded);
            justify-content: center;
            font-variant-numeric: tabular-nums;
        }
        
        .stat-box i { color: var(--accent); font-size: 1.1rem; }

        .title-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 2.5rem;
        }

        .ranked-title {
            font-size: 3.5rem;
            font-weight: 600;
            margin: 0;
            letter-spacing: -0.03em;
            color: var(--text-bright);
            line-height: 1;
        }

        .season-badge {
            display: inline-flex;
            align-items: center;
            background: var(--accent);
            border: 1px solid rgba(226, 182, 43, 0.25);
            color: var(--text-bright);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            margin-top: 0.6rem;
        }

        .action-bar {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-bottom: 2rem;
            position: relative;
        }

        .btn {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 28px;
            border-radius: 10px;
            border: none;
            font-family: var(--font);
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .btn-play { 
            background: var(--accent); 
            color: white; 
        }
        
        .btn-play:hover { 
            transform: translateY(-2px); 
            opacity: 0.9;
        }

        .btn-play:active {
            transform: translateY(0);
        }

        .btn-shop { 
            background: var(--card-bg); 
            color: var(--text-faded); 
        }

        .btn-locked, .btn-locked:hover {
            opacity: 0.35 !important;
            cursor: not-allowed !important;
            pointer-events: none !important;
            transform: none !important;
            color: var(--text-faded) !important;
        }

        .btn-cancel { 
            background: var(--error) !important; 
            color: white;
        }
        
        .btn-cancel:hover {
            opacity: 0.9;
        }

        /* Play Menu Dropdown */
        #play-menu {
            display: flex;
            flex-direction: column;
            gap: 8px;
            position: absolute;
            top: calc(100% + 10px);
            left: 0;
            background: var(--card-bg);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 12px;
            border-radius: 12px;
            opacity: 0;
            pointer-events: none;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 100;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            min-width: 200px;
            transform: translateY(-10px);
        }

        #play-menu.show {
            opacity: 1;
            pointer-events: auto;
            transform: translateY(0);
        }

        .menu-option {
            background: rgba(255,255,255,0.05);
            border: none;
            color: var(--text-bright);
            padding: 12px 20px;
            border-radius: 8px;
            font-family: var(--font);
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 10px;
            justify-content: flex-start;
            width: 100%;
            box-sizing: border-box;
        }

        .menu-option:hover {
            background: var(--accent);
            color: white;
        }

        /* Direct Challenge Input Layout */
        #challenge-input-box {
            display: none;
            flex-direction: column;
            gap: 8px;
            padding: 4px;
            margin-top: 4px;
            border-top: 1px solid rgba(255,255,255,0.05);
        }

        #challenge-input-box.show {
            display: flex;
        }

        #target-player-input {
            background: rgba(0, 0, 0, 0.25);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 6px;
            color: var(--text-bright);
            font-family: var(--font);
            font-size: 0.85rem;
            padding: 8px 12px;
            outline: none;
            transition: border-color 0.2s;
        }

        #target-player-input:focus {
            border-color: var(--accent);
        }

        .btn-send-challenge {
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-family: var(--font);
            font-size: 0.85rem;
            font-weight: 600;
            padding: 8px;
            transition: opacity 0.2s;
        }

        .btn-send-challenge:hover {
            opacity: 0.9;
        }

        .icon-wrapper {
            position: relative;
            display: inline-flex;
        }

        .lock-badge {
            position: absolute;
            bottom: -4px;
            right: -6px;
            font-size: 0.7rem;
            color: var(--error);
            opacity: 0;
            transform: scale(0.5);
            transition: all 0.2s ease;
        }

        .btn-locked .lock-badge {
            opacity: 1;
            transform: scale(1);
        }

        #queue-status {
            display: none; 
            align-items: center; 
            justify-content: center;
            gap: 12px;
            animation: fadeIn 0.3s ease;
        }

        .spinner {
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-top: 2px solid var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        .queue-text {
            display: flex;
            flex-direction: column;
            text-align: left;
        }

        /* Toasts & Alerts */
        #error-toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translate(-50%, -150px);
            background: var(--error);
            color: white;
            padding: 12px 24px;
            border-radius: 10px;
            font-weight: 600;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 10px;
            z-index: 1000;
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        #error-toast.show { transform: translate(-50%, 0); }

        #incoming-toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: var(--card-bg);
            border: 1px solid var(--accent);
            border-radius: 12px;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.6);
            padding: 18px 22px;
            transform: translateX(180%);
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            z-index: 999;
            display: flex;
            flex-direction: column;
            gap: 14px;
            min-width: 260px;
            text-align: left;
        }

        #incoming-toast.show { transform: translateX(0); }

        .incoming-header {
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text-bright);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .incoming-buttons {
            display: flex;
            gap: 8px;
        }

        .toast-btn {
            flex: 1;
            padding: 8px;
            border: none;
            border-radius: 6px;
            font-family: var(--font);
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .toast-btn-accept { background: var(--accent); color: white; }
        .toast-btn-decline { background: rgba(255, 255, 255, 0.1); color: var(--text-faded); }
        .toast-btn:hover { opacity: 0.9; }
        
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div id="error-toast">
        <i class="fa-solid fa-circle-exclamation"></i>
        <span id="error-text">Error message</span>
    </div>

    <div id="incoming-toast">
        <div class="incoming-header">
            <i class="fa-solid fa-bolt" style="color: var(--accent);"></i>
            <span id="challenge-prompt">Player challenged you!</span>
        </div>
        <div class="incoming-buttons">
            <button class="toast-btn toast-btn-accept" onclick="respondToChallenge(true)">Accept</button>
            <button class="toast-btn toast-btn-decline" onclick="respondToChallenge(false)">Decline</button>
        </div>
    </div>

    <div id="app">
        <div class="header-stats" id="profile-stats">
            <div class="stat-box">
                <i class="fa-solid fa-user"></i> <span id="username-display">Loading...</span>
            </div>
            <div class="stat-box">
                <i class="fa-solid fa-trophy"></i> <span id="elo-display">-- Elo</span>
            </div>
        </div>

        <div class="title-container">
            <h1 class="ranked-title">MeDoType</h1>
            <div class="season-badge">Season 1</div>
        </div>

        <div class="action-bar">
            <div>
                <button class="btn btn-play" id="main-btn" onclick="togglePlayMenu(event)">
                    <i class="fa-solid fa-play" id="btn-icon"></i> <span id="btn-text">Play</span>
                </button>
                <div id="play-menu">
                    <button class="menu-option" onclick="startMatchmaking('ranked')">
                        <i class="fa-solid fa-trophy"></i> Ranked Match
                    </button>
                    <button class="menu-option" onclick="toggleChallengeInput(event)">
                        <i class="fa-solid fa-user-ninja"></i> 1v1 Player
                    </button>
                    
                    <div id="challenge-input-box" onclick="event.stopPropagation()">
                        <input type="text" id="target-player-input" placeholder="Enter username..." autocomplete="off">
                        <button class="btn-send-challenge" onclick="sendDirectChallenge()">Send Request</button>
                    </div>
                </div>
            </div>

            <button class="btn btn-shop btn-locked" id="shop-btn" disabled>
                <span class="icon-wrapper">
                    <i class="fa-solid fa-cart-shopping" id="shop-icon"></i>
                    <i class="fa-solid fa-lock lock-badge" style="opacity: 1; transform: scale(1);"></i>
                </span>
                Shop
            </button>
        </div>

        <div id="queue-status">
            <div class="spinner"></div>
            <div class="queue-text">
                <span id="queue-action-label" style="font-size: 0.7rem; color: var(--text-faded); font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em;">Searching</span>
                <span id="queue-timer" style="font-size: 1rem; color: var(--accent); font-weight: 600; font-variant-numeric: tabular-nums;">00:00</span>
            </div>
        </div>
    </div>

    <script>
        const SB_URL = 'https://tzaowqeofmwfnprrfwat.supabase.co';
        const SB_KEY = 'sb_publishable_Sr33ux9FL6QZaJlfhjoqFw_tIwQhSbx';
        const _supabase = supabase.createClient(SB_URL, SB_KEY);

        let currentElo = 0;
        let currentUsername = "Player";
        let accessToken = null; 
        
        let isQueueing = false;
        let currentMode = null; // 'ranked' or 'direct_1v1'
        let queueInterval;
        let seconds = 0;
        let queueId = null;
        let queueSubscription = null;
        let realtimeGlobalListener = null;
        let activeIncomingRequest = null;
        let errorTimeout;

        async function loadUserProfile() {
            const { data: { session } } = await _supabase.auth.getSession();
            if (!session) return;

            accessToken = session.access_token;

            const { data: profile, error } = await _supabase
                .from('profiles')
                .select('elo, username')
                .eq('id', session.user.id)
                .single();

            if (profile) {
                currentElo = profile.elo || 0;
                currentUsername = profile.username || "Player";
                
                document.getElementById('username-display').innerText = currentUsername;
                document.getElementById('elo-display').innerText = `${currentElo}`;
                document.getElementById('profile-stats').style.opacity = '1';

                // Begin scanning for requests targeting this player
                initIncomingRequestListener();
            }
        }

        function showError(message) {
            const toast = document.getElementById('error-toast');
            document.getElementById('error-text').innerText = message;
            toast.classList.add('show');
            clearTimeout(errorTimeout);
            errorTimeout = setTimeout(() => toast.classList.remove('show'), 3000);
        }

        function startTimer() {
            seconds = 0;
            const timerDisplay = document.getElementById('queue-timer');
            queueInterval = setInterval(() => {
                seconds++;
                const mins = Math.floor(seconds / 60).toString().padStart(2, '0');
                const secs = (seconds % 60).toString().padStart(2, '0');
                timerDisplay.innerText = `${mins}:${secs}`;
            }, 1000);
        }

        function stopTimer() {
            clearInterval(queueInterval);
            document.getElementById('queue-timer').innerText = "00:00";
        }

        function togglePlayMenu(event) {
            if (event) event.stopPropagation();
            if (isQueueing) {
                stopQueueUI();
            } else {
                document.getElementById('play-menu').classList.toggle('show');
                document.getElementById('challenge-input-box').classList.remove('show');
            }
        }

        function toggleChallengeInput(event) {
            if (event) event.stopPropagation();
            document.getElementById('challenge-input-box').classList.toggle('show');
        }

        document.addEventListener('click', (e) => {
            const menu = document.getElementById('play-menu');
            if (menu && menu.classList.contains('show') && !menu.contains(e.target)) {
                menu.classList.remove('show');
            }
        });

        // ---------------- SYSTEM 1: PUBLIC MATCHMAKING (RANKED) ----------------
        async function startMatchmaking(mode) {
            document.getElementById('play-menu').classList.remove('show');
            
            const { data: { session } } = await _supabase.auth.getSession();
            if (!session) return showError("To play, please log in.");

            updateQueueUI(true, mode, "Searching");

            const { data, error } = await _supabase
                .from('ranked_queue')
                .insert([{ 
                    user_id: session.user.id, 
                    username: currentUsername,
                    elo: currentElo,
                    status: 'searching'
                }])
                .select();

            if (error) {
                stopQueueUI();
                return showError("Failed to join match pool. Try again.");
            }
            queueId = data[0].id;

            queueSubscription = _supabase
                .channel(`q_${queueId}`)
                .on('postgres_changes', { 
                    event: 'UPDATE', 
                    schema: 'public', 
                    table: 'ranked_queue', 
                    filter: `id=eq.${queueId}` 
                }, payload => {
                    if (payload.new.status === 'matched') {
                        matchFound(payload.new.match_id);
                    }
                })
                .subscribe((status) => {
                    if (status === 'SUBSCRIBED') {
                        checkNearbyPoolPlayers(session.user.id);
                    }
                });
        }

        async function checkNearbyPoolPlayers(myId) {
            if (!queueId) return;

            let query = _supabase
                .from('ranked_queue')
                .select('*')
                .eq('status', 'searching')
                .neq('id', queueId);

            if (!window.location.href.includes('medotypebeta.wasmer.app')) {
                query = query.neq('user_id', myId);
            }

            const { data: opponents } = await query.order('created_at', { ascending: true }).limit(1);

            if (opponents && opponents.length > 0) {
                const opponent = opponents[0];
                const sharedMatchId = crypto.randomUUID();

                const { data: matchedOpponent } = await _supabase
                    .from('ranked_queue')
                    .update({ status: 'matched', match_id: sharedMatchId })
                    .eq('id', opponent.id)
                    .eq('status', 'searching')
                    .select();

                if (matchedOpponent && matchedOpponent.length > 0) {
                    await _supabase
                        .from('ranked_queue')
                        .update({ status: 'matched', match_id: sharedMatchId })
                        .eq('id', queueId);
                }
            }
        }

        // ---------------- SYSTEM 2: OUTGOING CHALLENGES ----------------
        async function sendDirectChallenge() {
            const targetInput = document.getElementById('target-player-input');
            const targetName = targetInput.value.trim();

            if (!targetName) return showError("Enter a user's name to invite.");
            if (targetName.toLowerCase() === currentUsername.toLowerCase()) return showError("You cannot challenge yourself.");

            document.getElementById('play-menu').classList.remove('show');

            const { data: { session } } = await _supabase.auth.getSession();
            if (!session) return showError("Please log in to send requests.");

            updateQueueUI(true, 'direct_1v1', 'Awaiting Player');
            targetInput.value = '';

            const { data, error } = await _supabase
                .from('1v1_queue')
                .insert([{
                    user_id: session.user.id,
                    username: currentUsername,
                    target_username: targetName,
                    status: 'pending'
                }])
                .select();

            if (error) {
                stopQueueUI();
                return showError("Could not dispatch request.");
            }

            queueId = data[0].id;

            queueSubscription = _supabase
                .channel(`direct_${queueId}`)
                .on('postgres_changes', {
                    event: 'UPDATE',
                    schema: 'public',
                    table: '1v1_queue',
                    filter: `id=eq.${queueId}`
                }, payload => {
                    if (payload.new.status === 'accepted') {
                        matchFound(payload.new.match_id);
                    } else if (payload.new.status === 'declined') {
                        stopQueueUI();
                        showError(`${targetName} declined your challenge.`);
                    }
                })
                .subscribe();
        }

        // ---------------- SYSTEM 3: INCOMING CHALLENGES ----------------
        function initIncomingRequestListener() {
            realtimeGlobalListener = _supabase
                .channel('incoming_challenges')
                .on('postgres_changes', {
                    event: 'INSERT',
                    schema: 'public',
                    table: '1v1_queue',
                    filter: `target_username=eq.${currentUsername}`
                }, payload => {
                    if (payload.new.status === 'pending') {
                        processIncomingRequest(payload.new);
                    }
                })
                .subscribe();
        }

        function processIncomingRequest(request) {
            // Drop invitation if already busy in an action
            if (isQueueing) {
                _supabase.from('1v1_queue').update({ status: 'declined' }).eq('id', request.id);
                return;
            }

            activeIncomingRequest = request;
            document.getElementById('challenge-prompt').innerHTML = `<b>${request.username}</b> challenged you!`;
            document.getElementById('incoming-toast').classList.add('show');
        }

        async function respondToChallenge(accept) {
            if (!activeIncomingRequest) return;
            document.getElementById('incoming-toast').classList.remove('show');

            const req = activeIncomingRequest;
            activeIncomingRequest = null;

            if (accept) {
                const uniqueRoomId = crypto.randomUUID();
                updateQueueUI(true, 'direct_1v1', 'Connecting');

                const { error } = await _supabase
                    .from('1v1_queue')
                    .update({ status: 'accepted', match_id: uniqueRoomId })
                    .eq('id', req.id);

                if (error) {
                    stopQueueUI();
                    showError("Error responding to connection query.");
                } else {
                    matchFound(uniqueRoomId);
                }
            } else {
                await _supabase.from('1v1_queue').update({ status: 'declined' }).eq('id', req.id);
            }
        }

        // ---------------- SHARED CONTROLLER LOGIC ----------------
        function updateQueueUI(active, mode, statusLabel) {
            isQueueing = active;
            currentMode = mode;

            const btn = document.getElementById('main-btn');
            const btnText = document.getElementById('btn-text');
            const btnIcon = document.getElementById('btn-icon');
            const statusDiv = document.getElementById('queue-status');
            const shopBtn = document.getElementById('shop-btn');

            if (active) {
                btn.classList.add('btn-cancel');
                btnText.innerText = mode === 'ranked' ? "Cancel Ranked" : "Cancel Invite";
                btnIcon.className = "fa-solid fa-xmark";
                shopBtn.classList.add('btn-locked');
                document.getElementById('queue-action-label').innerText = statusLabel;
                statusDiv.style.display = 'flex';
                startTimer();
            }
        }

        async function stopQueueUI() {
            const btn = document.getElementById('main-btn');
            const btnText = document.getElementById('btn-text');
            const btnIcon = document.getElementById('btn-icon');
            const statusDiv = document.getElementById('queue-status');
            const shopBtn = document.getElementById('shop-btn');

            isQueueing = false;
            
            btn.classList.remove('btn-cancel');
            btnText.innerText = "Play";
            btnIcon.className = "fa-solid fa-play";
            shopBtn.classList.remove('btn-locked');
            
            statusDiv.style.display = 'none';
            stopTimer();

            if (queueId && currentMode) {
                const tableName = currentMode === 'ranked' ? 'ranked_queue' : '1v1_queue';
                await _supabase.from(tableName).delete().eq('id', queueId);
                queueId = null;
            }
            
            if (queueSubscription) {
                _supabase.removeChannel(queueSubscription);
                queueSubscription = null;
            }
            currentMode = null;
        }

        function matchFound(matchId) {
            stopTimer();
            document.getElementById('btn-text').innerText = "MATCH FOUND!";
            document.getElementById('main-btn').style.background = "var(--accent)";
            document.getElementById('main-btn').classList.remove('btn-cancel');
            document.getElementById('btn-icon').className = "fa-solid fa-check";
            
            queueId = null; 
            if (queueSubscription) {
                _supabase.removeChannel(queueSubscription);
                queueSubscription = null;
            }

            setTimeout(() => { window.location.href = `game.html?${matchId}`; }, 1500);
        }

        window.addEventListener('beforeunload', () => {
            if (queueId && currentMode) {
                const tableName = currentMode === 'ranked' ? 'ranked_queue' : '1v1_queue';
                const url = `${SB_URL}/rest/v1/${tableName}?id=eq.${queueId}`;
                const headers = {
                    'apikey': SB_KEY,
                    'Authorization': accessToken ? `Bearer ${accessToken}` : `Bearer ${SB_KEY}`
                };
                
                fetch(url, {
                    method: 'DELETE',
                    headers: headers,
                    keepalive: true
                });
            }
        });

        loadUserProfile();
    </script>
</body>
</html>
