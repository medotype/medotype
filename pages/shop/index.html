<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MeDoType | Shop</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="../../data/css/root.css">
    <script src="../../data/js/theme.js"></script>
    
    <style>
        /* --- Base Layout --- */
        body { 
            background-color: var(--bg); 
            color: var(--text-bright); 
            font-family: var(--font); 
            margin: 0; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            overflow-x: hidden;
        }
        
        #app { 
            width: 100%; 
            max-width: 1000px; 
            padding: 2rem; 
            display: flex;
            flex-direction: column;
            align-items: center;
            box-sizing: border-box;
        }

        /* --- Navigation --- */
        .btn-back {
            background: rgba(255, 255, 255, 0.03);
            color: var(--text-faded);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 10px 20px;
            border-radius: 10px;
            font-family: var(--font);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            align-self: flex-start;
            margin-bottom: 1.5rem;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 0.05em;
        }

        .btn-back:hover {
            color: var(--text-bright);
            border-color: var(--accent);
            background: rgba(255, 255, 255, 0.05);
            transform: translateX(-2px);
        }

        /* --- Header Deck --- */
        .shop-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            background: var(--card-bg);
            padding: 24px 30px;
            border-radius: 20px;
            margin-bottom: 2rem;
            box-sizing: border-box;
            border: 1px solid rgba(255, 255, 255, 0.03);
        }

        .shop-title-area {
            display: flex;
            flex-direction: column;
            gap: 6px;
            text-align: left;
        }

        .shop-title { 
            font-size: 2rem; 
            font-weight: 800; 
            color: var(--text-bright); 
            margin: 0;
            letter-spacing: -0.03em;
            text-transform: uppercase;
        }
        
        .shop-subtitle { 
            font-size: 0.9rem; 
            color: var(--text-faded); 
            margin: 0;
            line-height: 1.4;
        }

        .user-balance-card {
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(0, 0, 0, 0.15);
            padding: 12px 24px;
            border-radius: 14px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            text-align: right;
        }

        .balance-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            color: var(--text-faded);
            font-weight: 800;
            letter-spacing: 0.08em;
        }

        .balance-value {
            font-size: 1.4rem;
            font-weight: 800;
            color: var(--accent);
            font-variant-numeric: tabular-nums;
            margin-top: 2px;
        }

        .shop-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 24px;
            width: 100%;
            margin-bottom: 2rem;
        }

        .shop-card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 35px 24px;
            border: 1px solid rgba(255, 255, 255, 0.03);
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            transition: all 0.25s ease;
            box-sizing: border-box;
        }

        .shop-card:not(.locked):hover {
            transform: translateY(-4px);
            border-color: var(--accent);
            background: rgba(255, 255, 255, 0.02);
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.2);
        }

        .shop-card.locked {
            opacity: 0.35;
        }

        .avatar-container {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            overflow: hidden;
            background: rgba(0, 0, 0, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.05);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .avatar-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .lock-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--error);
            font-size: 1.3rem;
        }

        .item-name {
            font-size: 1.3rem;
            font-weight: 800;
            color: var(--text-bright);
            margin: 0 0 6px 0;
            text-transform: uppercase;
            letter-spacing: 0.02em;
        }

        .item-price {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-faded);
            margin: 0 0 24px 0;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .item-price.unlocked-text {
            color: #10b981;
        }

        .btn-action {
            background: rgba(255, 255, 255, 0.03);
            color: var(--text-bright);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 12px 0;
            border-radius: 12px;
            font-family: var(--font);
            font-weight: 800;
            cursor: pointer;
            width: 100%;
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            transition: all 0.2s ease;
        }

        .btn-action:hover:not(:disabled) {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
            transform: translateY(-2px);
        }

        .btn-action:disabled {
            cursor: not-allowed;
        }

        .btn-action.equipped {
            background: #10b981 !important;
            color: white !important;
            border-color: #10b981 !important;
            opacity: 1 !important;
        }

        #toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            padding: 14px 28px;
            border-radius: 12px;
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-left: 4px solid var(--accent);
            color: var(--text-bright);
            font-weight: 600;
            box-shadow: 0 12px 32px rgba(0,0,0,0.4);
            transform: translateY(150px);
            opacity: 0;
            transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.25s ease;
            z-index: 2000;
        }

        #toast.show {
            transform: translateY(0);
            opacity: 1;
        }

        /* --- Responsive Viewports --- */
        @media (max-width: 900px) { 
            .shop-grid { grid-template-columns: repeat(2, 1fr); gap: 16px; } 
        }

        @media (max-width: 600px) { 
            .shop-header { flex-direction: column; text-align: center; gap: 20px; padding: 20px; }
            .shop-title-area { text-align: center; }
            .user-balance-card { text-align: center; justify-content: center; width: 100%; box-sizing: border-box; }
            .shop-grid { grid-template-columns: 1fr; max-width: 340px; gap: 16px; } 
        }
    </style>
</head>
<body>

    <div id="app">
        <button class="btn-back" onclick="window.location.href='../home.html'">
            <i class="fa-solid fa-arrow-left"></i> Back to Home
        </button>
        
        <div class="shop-header">
            <div class="shop-title-area">
                <h1 class="shop-title">Rank Rewards</h1>
                <p class="shop-subtitle">Unlock and equip exclusive profile pictures based on your current ELO milestone</p>
            </div>
            <div class="user-balance-card">
                <div>
                    <div class="balance-label">Your Current Rank</div>
                    <div class="balance-value"><span id="user-elo">0</span> ELO</div>
                </div>
            </div>
        </div>

        <div class="shop-grid" id="shop-grid-container"></div>
    </div>

    <div id="toast">Avatar updated successfully!</div>

   <script>
const SB_URL = 'https://tzaowqeofmwfnprrfwat.supabase.co';
const SB_KEY = 'sb_publishable_Sr33ux9FL6QZaJlfhjoqFw_tIwQhSbx';
const _supabase = supabase.createClient(SB_URL, SB_KEY);

let myId = null;
let myElo = 0;
let equippedAvatarId = "0";

const shopCatalog = [
    { id: "0", name: "Default", requiredElo: 0, src: "../../data/images/0.png", category: "Avatars" },
    { id: "50", name: "Melt", requiredElo: 50, src: "../../data/images/50.png", category: "Avatars" },
    { id: "125", name: "SOS", requiredElo: 125, src: "../../data/images/125.png", category: "Avatars" },
    { id: "175", name: "Innocent", requiredElo: 175, src: "../../data/images/175.png", category: "Avatars" },
    { id: "225", name: "Chad", requiredElo: 225, src: "../../data/images/225.png", category: "Avatars" },
    { id: "300", name: "Demon", requiredElo: 300, src: "../../data/images/300.png", category: "Avatars" },
    { id: "400", name: "Angel", requiredElo: 400, src: "../../data/images/400.png", category: "Avatars" }
];

async function initShop() {
    console.log("[SHOP] Fetching user verification data...");
    const { data: { session }, error: sessionErr } = await _supabase.auth.getSession();
    
    if (sessionErr || !session) {
        console.error("[SHOP] Session validation failed:", sessionErr);
        return window.location.href = 'home.html';
    }
    
    myId = session.user.id;

    const { data: profile, error: profileErr } = await _supabase
        .from('profiles')
        .select('elo, avatar_id') 
        .eq('id', myId)
        .single();

    if (profileErr) {
        console.warn("[SHOP] Error loading profile data, using defaults:", profileErr);
    }

    myElo = profile?.elo || 0;
    equippedAvatarId = profile?.avatar_id || "0"; 

    document.getElementById('user-elo').innerText = myElo;
    
    renderShop();
}

function renderShop() {
    const container = document.getElementById('shop-grid-container');
    container.innerHTML = "";

    // Grouping items by category dynamically from the catalog above
    const categories = [...new Set(shopCatalog.map(item => item.category))];

    categories.forEach(category => {
        // Create a category section header
        const header = document.createElement('h2');
        header.className = 'category-header';
        header.style.cssText = "width: 100%; grid-column: 1 / -1; margin-top: 1.5rem; color: var(--accent); font-weight: 800; text-transform: uppercase; font-size: 1.1rem; letter-spacing: 0.05em;";
        header.innerText = category;
        container.appendChild(header);

        // Filter and display items belonging to this category
        const itemsInCategory = shopCatalog.filter(item => item.category === category);

        itemsInCategory.forEach(item => {
            const isUnlocked = myElo >= item.requiredElo;
            const isEquipped = equippedAvatarId === item.id;
            
            let actionBtnHtml = "";
            if (isEquipped) {
                actionBtnHtml = `<button class="btn-action equipped" disabled>Equipped</button>`;
            } else if (isUnlocked) {
                actionBtnHtml = `<button class="btn-action" onclick="equipItem('${item.id}')">Equip</button>`;
            } else {
                actionBtnHtml = `<button class="btn-action" disabled><i class="fa-solid fa-lock"></i> Locked</button>`;
            }

            const card = document.createElement('div');
            card.className = `shop-card ${!isUnlocked ? 'locked' : ''}`;
            card.innerHTML = `
                <div class="avatar-container">
                    <img src="${item.src}" alt="${item.name}" class="avatar-img" onerror="this.src='../../data/images/pfps/default.png';">
                    ${!isUnlocked ? '<div class="lock-overlay"><i class="fa-solid fa-lock"></i></div>' : ''}
                </div>
                <h3 class="item-name">${item.name}</h3>
                <div class="item-price ${isUnlocked ? 'unlocked-text' : ''}">
                    ${isUnlocked 
                        ? '<i class="fa-solid fa-circle-check"></i> Unlocked' 
                        : `<i class="fa-solid fa-bolt"></i> Req: ${item.requiredElo} ELO`
                    }
                </div>
                ${actionBtnHtml}
            `;
            container.appendChild(card);
        });
    });
}

async function equipItem(itemId) {
    equippedAvatarId = itemId;

    const { error } = await _supabase
        .from('profiles')
        .update({ avatar_id: itemId })
        .eq('id', myId);

    if (error) {
        console.error("[SHOP] Error equipping item:", error);
        showToast("Failed to equip asset.");
        return;
    }

    showToast("Avatar successfully updated!");
    renderShop(); 
}

let toastTimeout;
function showToast(message) {
    const toast = document.getElementById('toast');
    toast.innerText = message;
    toast.classList.add('show');
    clearTimeout(toastTimeout);
    toastTimeout = setTimeout(() => {
        toast.classList.remove('show');
    }, 3000);
}

initShop();
</script>
</body>
</html>
