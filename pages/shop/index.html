<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MeDoType | Shop</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="../../data/css/root.css">
    <script src="../../data/js/theme.js"></script>
    
    <style>
        body { 
            background-color: var(--bg); 
            color: var(--text-bright); 
            font-family: var(--font); 
            margin: 0; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            overflow-x: hidden;
        }
        
        #app { 
            width: 100%; 
            max-width: 1000px; 
            padding: 2rem; 
            display: flex;
            flex-direction: column;
            align-items: center;
            box-sizing: border-box;
        }

        /* --- Navigation --- */
        .btn-back {
            background: rgba(255, 255, 255, 0.03);
            color: var(--text-faded);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 10px 20px;
            border-radius: 10px;
            font-family: var(--font);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            align-self: flex-start;
            margin-bottom: 1.5rem;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 0.05em;
        }

        .btn-back:hover {
            color: var(--text-bright);
            border-color: var(--accent);
            background: rgba(255, 255, 255, 0.05);
            transform: translateX(-2px);
        }

        /* --- Header --- */
        .shop-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            background: var(--card-bg);
            padding: 24px 30px;
            border-radius: 20px;
            margin-bottom: 1rem;
            box-sizing: border-box;
            border: 1px solid rgba(255, 255, 255, 0.03);
        }

        .shop-title-area {
            display: flex;
            flex-direction: column;
            gap: 6px;
            text-align: left;
        }

        .shop-title { 
            font-size: 2rem; 
            font-weight: 800; 
            color: var(--text-bright); 
            margin: 0;
            letter-spacing: -0.03em;
            text-transform: uppercase;
        }
        
        .shop-subtitle { 
            font-size: 0.9rem; 
            color: var(--text-faded); 
            margin: 0;
            line-height: 1.4;
        }

        .user-balance-card {
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(0, 0, 0, 0.15);
            padding: 12px 24px;
            border-radius: 14px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            text-align: right;
        }

        .balance-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            color: var(--text-faded);
            font-weight: 800;
            letter-spacing: 0.08em;
        }

        .balance-value {
            font-size: 1.4rem;
            font-weight: 800;
            color: var(--accent);
            font-variant-numeric: tabular-nums;
            margin-top: 2px;
        }

        /* --- Section Titles --- */
        .section-title {
            width: 100%;
            text-align: left;
            margin-top: 2.5rem;
            margin-bottom: 1rem;
            font-size: 1.4rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: -0.01em;
            color: var(--text-bright);
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            padding-bottom: 10px;
        }

        .section-title i {
            color: var(--accent);
        }

        /* --- Card Grids --- */
        .shop-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            width: 100%;
            margin-bottom: 1rem;
        }

        .shop-card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 20px 16px;
            border: 1px solid rgba(255, 255, 255, 0.03);
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            transition: all 0.25s ease;
            box-sizing: border-box;
        }

        .shop-card:hover {
            transform: translateY(-4px);
            border-color: var(--accent);
            background: rgba(255, 255, 255, 0.02);
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.2);
        }
        
        /* --- Badges --- */
        .badge {
            position: absolute;
            top: -10px;
            right: -10px;
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 0.65rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            z-index: 10;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .badge.limited {
            background: #f59e0b;
            color: white;
            box-shadow: 0 4px 10px rgba(245, 158, 11, 0.4);
        }

        .badge.seasonal {
            background: #3b82f6;
            color: white;
            box-shadow: 0 4px 10px rgba(59, 130, 246, 0.4);
        }

        .avatar-container {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            overflow: hidden;
            background: rgba(0, 0, 0, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.05);
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .avatar-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .item-name {
            font-size: 1.1rem;
            font-weight: 800;
            color: var(--text-bright);
            margin: 0 0 4px 0;
            text-transform: uppercase;
            letter-spacing: 0.02em;
        }

        .item-price {
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-faded);
            margin: 0 0 16px 0;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .btn-action {
            background: rgba(255, 255, 255, 0.03);
            color: var(--text-bright);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 10px 0;
            border-radius: 10px;
            font-family: var(--font);
            font-weight: 800;
            cursor: pointer;
            width: 100%;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            transition: all 0.2s ease;
        }

        .btn-action:hover:not(:disabled) {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
            transform: translateY(-2px);
        }

        .btn-action:disabled {
            cursor: not-allowed;
            opacity: 0.6;
        }

        .btn-action.equipped {
            background: #10b981 !important;
            color: white !important;
            border-color: #10b981 !important;
            opacity: 1 !important;
        }

        .btn-action.buy-btn {
            background: rgba(168, 85, 247, 0.1);
            border-color: rgba(168, 85, 247, 0.3);
            color: #c084fc;
        }

        .btn-action.buy-btn:hover:not(:disabled) {
            background: #a855f7;
            color: white;
            border-color: #a855f7;
        }

        #toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            padding: 14px 28px;
            border-radius: 12px;
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-left: 4px solid var(--accent);
            color: var(--text-bright);
            font-weight: 600;
            box-shadow: 0 12px 32px rgba(0,0,0,0.4);
            transform: translateY(150px);
            opacity: 0;
            transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.25s ease;
            z-index: 2000;
        }

        #toast.show {
            transform: translateY(0);
            opacity: 1;
        }

        /* --- Responsive Styles --- */
        @media (max-width: 900px) { 
            .shop-grid { grid-template-columns: repeat(3, 1fr); gap: 12px; } 
        }

        @media (max-width: 600px) { 
            .shop-header { flex-direction: column; text-align: center; gap: 20px; padding: 20px; }
            .shop-title-area { text-align: center; }
            .user-balance-card { text-align: center; justify-content: center; width: 100%; box-sizing: border-box; }
            .shop-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; } 
        }
    </style>
</head>
<body>

    <div id="app">
        <button class="btn-back" onclick="window.location.href='../home.html'">
            <i class="fa-solid fa-arrow-left"></i> Back
        </button>
        
        <div class="shop-header">
            <div class="shop-title-area">
                <h1 class="shop-title">Shop</h1>
                <p class="shop-subtitle">Customize your look with brand new avatars!</p>
            </div>
            <div class="user-balance-card">
                <div>
                    <div class="balance-label">Your Coins</div>
                    <div class="balance-value"><span id="user-coins">0</span></div>
                </div>
            </div>
        </div>

        <h2 class="section-title"><i class="fa-solid fa-box-open"></i> Your Inventory</h2>
        <div class="shop-grid" id="inventory-grid-container"></div>

        <h2 class="section-title"><i class="fa-solid fa-store"></i> Items For Sale</h2>
        <div class="shop-grid" id="shop-grid-container"></div>
    </div>

    <div id="toast">Loading...</div>

<script>
    const SB_URL = 'https://tzaowqeofmwfnprrfwat.supabase.co';
    const SB_KEY = 'sb_publishable_Sr33ux9FL6QZaJlfhjoqFw_tIwQhSbx';
    const _supabase = supabase.createClient(SB_URL, SB_KEY);

    let myId = null;
    let myCoins = 0;
    let equippedAvatarId = "default";
    let unlockedAvatars = ["default"]; 
    
    let masterCatalog = []; 
    let activeStockIds = []; 

    async function initShop() {
        const { data: { session }, error: sessionErr } = await _supabase.auth.getSession();
        
        if (sessionErr || !session) {
            return window.location.href = '/pages/home.html';
        }
        
        myId = session.user.id;
        
        // Load items from database
        await loadShopDataFromDB();
        
        // Load player profile data
        await fetchUserData();
    }

    async function loadShopDataFromDB() {
        const [itemsResult, stockResult] = await Promise.all([
            _supabase.from('items').select('*').order('price', { ascending: true }),
            _supabase.from('instock').select('item_id')
        ]);

        if (itemsResult.error || stockResult.error) {
            console.error("Error loading store setup:", itemsResult.error, stockResult.error);
            showToast("Could not load shop items.");
            return;
        }

        masterCatalog = itemsResult.data || [];
        activeStockIds = (stockResult.data || []).map(row => row.item_id);
    }

    async function fetchUserData() {
        const { data: profile, error: profileErr } = await _supabase
            .from('profiles')
            .select('coins, avatar_id, unlocked_avatars') 
            .eq('id', myId)
            .maybeSingle();

        if (profileErr) {
            console.warn("Error getting player info:", profileErr);
        }

        myCoins = profile?.coins || 0;
        equippedAvatarId = profile?.avatar_id || "default"; 
        unlockedAvatars = profile?.unlocked_avatars || ["default"];

        document.getElementById('user-coins').innerText = myCoins;
        
        renderShop();
    }

    function renderShop() {
        const inventoryContainer = document.getElementById('inventory-grid-container');
        const shopContainer = document.getElementById('shop-grid-container');
        
        inventoryContainer.innerHTML = "";
        shopContainer.innerHTML = "";

        // 1. Inventory displays everything you already own
        const ownedItems = masterCatalog.filter(item => unlockedAvatars.includes(item.id));
        
        // 2. Shop displays everything currently marked as "in stock"
        const storefrontItems = masterCatalog.filter(item => activeStockIds.includes(item.id));

        // Show items in your Inventory
        if (ownedItems.length === 0) {
            inventoryContainer.innerHTML = `<p style="color: var(--text-faded); font-style: italic; font-size: 0.9rem;">No items owned yet.</p>`;
        } else {
            ownedItems.forEach(item => {
                const isEquipped = equippedAvatarId === item.id;
                const actionBtnHtml = isEquipped 
                    ? `<button class="btn-action equipped" disabled>Equipped</button>` 
                    : `<button class="btn-action" onclick="equipItem('${item.id}')">Equip</button>`;

                // Shows the price even though it is in your inventory!
                const priceLabel = `<i class="fa-solid fa-coins"></i> Value: ${item.price} Coins`;
                const card = createCardMarkup(item, priceLabel, actionBtnHtml);
                inventoryContainer.appendChild(card);
            });
        }

        // Show items in the Shop
        if (storefrontItems.length === 0) {
            shopContainer.innerHTML = `<p style="color: var(--text-faded); font-style: italic; font-size: 0.9rem;">No items are currently in the shop rotation.</p>`;
        } else {
            storefrontItems.forEach(item => {
                const alreadyOwned = unlockedAvatars.includes(item.id);
                let actionBtnHtml = "";
                
                if (alreadyOwned) {
                    // Item is bought -> shows "Purchased" instead of a buy option
                    actionBtnHtml = `<button class="btn-action" disabled style="background: rgba(255,255,255,0.04); color: var(--text-faded); border-color: transparent;">Purchased</button>`;
                } else {
                    const canAfford = myCoins >= item.price;
                    actionBtnHtml = canAfford
                        ? `<button class="btn-action buy-btn" onclick="buyItem('${item.id}')">Buy</button>`
                        : `<button class="btn-action" disabled><i class="fa-solid fa-lock"></i> Not Enough Coins</button>`;
                }

                const priceLabel = `<i class="fa-solid fa-coins"></i> Cost: ${item.price} Coins`;
                const card = createCardMarkup(item, priceLabel, actionBtnHtml);
                shopContainer.appendChild(card);
            });
        }
    }

    function createCardMarkup(item, priceLabel, buttonHtml) {
        let badgeHtml = "";
        const categoryLower = item.category.toLowerCase();
        if (categoryLower === "limited") {
            badgeHtml = `<div class="badge limited"><i class="fa-solid fa-star"></i> Limited</div>`;
        } else if (categoryLower === "seasonal") {
            badgeHtml = `<div class="badge seasonal"><i class="fa-solid fa-leaf"></i> Seasonal</div>`;
        }

        const card = document.createElement('div');
        card.className = `shop-card`;
        card.innerHTML = `
            ${badgeHtml}
            <div class="avatar-container">
                <img src="${item.src}" alt="${item.name}" class="avatar-img" onerror="this.src='../../data/images/default.png';">
            </div>
            <h3 class="item-name">${item.name}</h3>
            <div class="item-price">
                ${priceLabel}
            </div>
            ${buttonHtml}
        `;
        return card;
    }

    async function buyItem(itemId) {
        const { data, error } = await _supabase.rpc('buy_avatar', {
            avatar_id_to_buy: itemId
        });

        if (error) {
            console.error("Purchase failed:", error.message);
            showToast(error.message || "Could not complete purchase.");
            return;
        }

        showToast(`Item purchased successfully!`);
        await loadShopDataFromDB(); 
        await fetchUserData();      
    }

    async function equipItem(itemId) {
        equippedAvatarId = itemId;

        const { error } = await _supabase
            .from('profiles')
            .update({ avatar_id: itemId })
            .eq('id', myId);

        if (error) {
            console.error("Equip failed:", error);
            showToast("Could not change avatar.");
            return;
        }

        showToast("Avatar updated!");
        await fetchUserData(); 
    }

    let toastTimeout;
    function showToast(message) {
        const toast = document.getElementById('toast');
        toast.innerText = message;
        toast.classList.add('show');
        clearTimeout(toastTimeout);
        toastTimeout = setTimeout(() => {
            toast.classList.remove('show');
        }, 3000);
    }

    initShop();
</script>
</body>
</html>
