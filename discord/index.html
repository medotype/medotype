<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MeDoType (Discord)</title>

    <script>
        if (/Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent)) {
            window.location.replace('mobile/index.html');
        }
    </script>

    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    
    <link rel="stylesheet" href="/cdnjs-assets/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../data/css/index.css">
    <link rel="stylesheet" href="../data/css/root.css">
    <script src="../data/js/theme.js"></script>

    <script src="/cdnjs-assets/ajax/libs/supabase/2.39.8/supabase.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@discord/embedded-app-sdk@2.5.0/dist/index.global.js"></script>

    <style>
        .discord-badge {
            background-color: #5865F2;
            color: white;
            font-size: 0.65rem;
            font-weight: 600;
            padding: 2px 8px;
            border-radius: 12px;
            margin-left: 8px;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            vertical-align: middle;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        #incoming-toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: var(--card-bg, #1e1e24);
            border: 1px solid var(--accent, #5865F2);
            border-radius: 12px;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.6);
            padding: 18px 22px;
            transform: translateX(180%);
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            z-index: 9999; 
            display: flex;
            flex-direction: column;
            gap: 14px;
            min-width: 260px;
            text-align: left;
            font-family: var(--font, 'Inter', sans-serif);
        }

        #incoming-toast.show { transform: translateX(0); }

        .incoming-header {
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text-bright, #fff);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .incoming-buttons {
            display: flex;
            gap: 8px;
        }

        .toast-btn {
            flex: 1;
            padding: 8px;
            border: none;
            border-radius: 6px;
            font-family: var(--font, 'Inter', sans-serif);
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .toast-btn-accept { background: var(--accent, #5865F2); color: white; }
        .toast-btn-decline { background: rgba(255, 255, 255, 0.1); color: var(--text-faded, #aaa); }
        .toast-btn:hover { opacity: 0.9; }

        #settings-modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.75);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease;
            backdrop-filter: blur(3px);
        }

        #settings-modal-overlay.show {
            opacity: 1;
            pointer-events: auto;
        }

        .settings-modal {
            background: var(--card-bg, #1e1e24);
            border: 1px solid var(--accent, #5865F2);
            border-radius: 12px;
            padding: 24px;
            max-width: 320px;
            text-align: center;
            font-family: var(--font, 'Inter', sans-serif);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.6);
            transform: scale(0.95);
            transition: transform 0.2s ease;
        }

        #settings-modal-overlay.show .settings-modal {
            transform: scale(1);
        }

        .settings-modal i.fa-gear {
            font-size: 2rem;
            color: var(--accent, #5865F2);
            margin-bottom: 12px;
        }

        .settings-modal h3 {
            margin: 0 0 10px 0;
            color: var(--text-bright, #fff);
            font-size: 1.2rem;
        }

        .settings-modal p {
            color: var(--text-faded, #aaa);
            font-size: 0.9rem;
            margin: 0 0 20px 0;
            line-height: 1.4;
        }
    </style>
</head>
    
<body>

    <header>
        <div class="brand" onclick="navigateFrame('../pages/home.html', this)">
            <i class="fa-solid fa-keyboard"></i>
            <span class="logo-text">MeDoType</span>
            <span class="discord-badge"><i class="fa-brands fa-discord"></i> App</span>
        </div>

        <div class="search-container">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input type="text" id="global-search" placeholder="search users..." onkeypress="if(event.key === 'Enter') handleSearch()">
        </div>
        
        <nav class="nav-links">
            <a onclick="navigateFrame('../pages/home.html', this)" class="active" title="Home">
                <i class="fa-solid fa-house"></i>
            </a>
            <a onclick="navigateFrame('../pages/leaderboard.html', this)" title="Leaderboard">
                <i class="fa-solid fa-trophy"></i>
            </a>
            
            <a onclick="showSettingsModal()" title="Settings">
                <i class="fa-solid fa-gear"></i>
            </a>
            <a onclick="navigateFrame('../pages/account.html', this)" title="Account">
                <i class="fa-solid fa-circle-user"></i>
            </a>
        </nav>
    </header>    
    <main class="content-wrapper">
        <iframe id="main-frame" src="../pages/home.html" title="Loading..."></iframe>
    </main>

    <footer>
        <div class="footer-left">
            <span>&copy; 2026 <span class="footer-accent">MeDoType</span></span>
        </div>
        <div class="footer-right">
            Discord
        </div>
    </footer>

    <div id="incoming-toast">
        <div class="incoming-header">
            <i class="fa-solid fa-bolt" style="color: var(--accent);"></i>
            <span id="challenge-prompt">Player challenged you!</span>
        </div>
        <div class="incoming-buttons">
            <button class="toast-btn toast-btn-accept" onclick="respondToGlobalChallenge(true)">Accept</button>
            <button class="toast-btn toast-btn-decline" onclick="respondToGlobalChallenge(false)">Decline</button>
        </div>
    </div>
    
            // fuck discord users ur not getting settings nerd

    <div id="settings-modal-overlay">
        <div class="settings-modal">
            <i class="fa-solid fa-gear"></i>
            <h3>Settings Unavailable</h3>
            <p>You can customize your profile and settings on our main website, but this feature is locked on the Discord version.</p>
            <button class="toast-btn toast-btn-accept" style="width: 100%;" onclick="closeSettingsModal()">Got it</button>
        </div>
    </div>

    <script src="../data/js/index.js"></script>

    <script>
        const discordSdk = new window.discord.DiscordSDK("1515605313049333820");

        window.discord.patchUrlMappings([
            {
                prefix: '/supabase-api',
                target: 'tzaowqeofmwfnprrfwat.supabase.co',
            },
            {
                prefix: '/cdnjs-assets',
                target: 'cdnjs.cloudflare.com'
            }
        ]);

        const SHELL_SB_URL = 'https://tzaowqeofmwfnprrfwat.supabase.co';
        const SHELL_SB_KEY = 'sb_publishable_Sr33ux9FL6QZaJlfhjoqFw_tIwQhSbx';
        const shellSupabase = supabase.createClient(SHELL_SB_URL, SHELL_SB_KEY);

        let shellCurrentUsername = null;
        let shellActiveRequest = null;

        function showSettingsModal() {
            document.getElementById('settings-modal-overlay').classList.add('show');
        }

        function closeSettingsModal() {
            document.getElementById('settings-modal-overlay').classList.remove('show');
        }
        // placeholder cus this bitch broken asf
        async function setupDiscordPresence() {
            try {
                await discordSdk.ready();
                await discordSdk.commands.authorize({
                    client_id: "1515605313049333820",
                    response_type: "code",
                    state: "1",
                    prompt: "none",
                    scope: ["rpc.activities.write"],
                });

                await discordSdk.commands.setActivity({
                    activity: {
                        details: "Chilling in Menu",
                        state: "Preparing to Race",
                        assets: {
                            large_image: "game_logo",
                            large_text: "MeDoType"
                        }
                    }
                });
                console.log("[DISCORD] Presence bridge successfully established.");
            } catch (err) {
                console.warn("[DISCORD] Failed setup. Running inside standard browser alternative.", err);
            }
        }

        async function initGlobalChallengeListener() {
            await setupDiscordPresence();

            const { data: { session } } = await shellSupabase.auth.getSession();
            if (!session) return;

            const { data: profile } = await shellSupabase
                .from('profiles')
                .select('username')
                .eq('id', session.user.id)
                .single();

            if (profile && profile.username) {
                shellCurrentUsername = profile.username;
                
                shellSupabase.channel('global_incoming_challenges')
                    .on('postgres_changes', {
                        event: 'INSERT',
                        schema: 'public',
                        table: '1v1_queue',
                        filter: `target_username=eq.${shellCurrentUsername}`
                    }, payload => {
                        if (payload.new.status === 'pending') {
                            showGlobalChallengeToast(payload.new);
                        }
                    })
                    .subscribe();
            }
        }

        function showGlobalChallengeToast(request) {
            shellActiveRequest = request;
            document.getElementById('challenge-prompt').innerHTML = `<b>${request.username}</b> challenged you!`;
            document.getElementById('incoming-toast').classList.add('show');
        }

        async function respondToGlobalChallenge(accept) {
            if (!shellActiveRequest) return;
            document.getElementById('incoming-toast').classList.remove('show');

            const req = shellActiveRequest;
            shellActiveRequest = null;

            if (accept) {
                const uniqueRoomId = (typeof crypto !== 'undefined' && crypto.randomUUID) 
                    ? crypto.randomUUID() 
                    : Math.random().toString(36).substring(2, 15) + Math.random().toString(36).substring(2, 15);
                
                const { error } = await shellSupabase
                    .from('1v1_queue')
                    .update({ status: 'accepted', match_id: uniqueRoomId })
                    .eq('id', req.id);

                if (!error) {
                    const frame = document.getElementById('main-frame');
                    if (frame) {
                        frame.src = `../pages/ranked/1v1.html?${uniqueRoomId}`;
                    }

                    try {
                        discordSdk.commands.setActivity({
                            activity: {
                                details: "Entering a 1v1 Ranked Match",
                                state: `Challenged by ${req.username}`,
                                assets: { large_image: "game_logo", large_text: "MeDoType" }
                            }
                        });
                    } catch (e) {}
                } else {
                    console.error("Failed to accept challenge", error);
                }
            } else {
                await shellSupabase.from('1v1_queue').update({ status: 'declined' }).eq('id', req.id);
            }
        }

        window.addEventListener('DOMContentLoaded', initGlobalChallengeListener);
    </script>
</body>
</html>
